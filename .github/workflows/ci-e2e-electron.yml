name: CI Electron E2E

# Playwright-Electron suite (native-surface flows the web-client E2E and unit
# tests cannot reach): zombie-adoption modal, Doctor version-skew row, tray
# foreign row. Packages the app (electron-forge package) then runs the specs.
# Matrix: ubuntu-latest (POSIX zombie branch, under xvfb) + windows-latest (the
# win32 `decideIsZombie` branch — bootParentAlive-only — in the REAL app; task
# 7.4b detection safety net).
#
# Cadence (change: run-electron-e2e-native-surface): workflow_dispatch (on
# demand) + a pull_request path-filter so only electron-touching PRs pay the
# ~5–8 min cost. ADVISORY — not a required check (no branch-protection gate);
# the job-object-windows job is `continue-on-error`.
# See change: electron-attach-ownership-fixes (harness), run-electron-e2e-native-surface (cadence).

on:
  workflow_dispatch:
  pull_request:
    branches: [develop]
    paths:
      - "packages/electron/**"
      - "tests/e2e-electron/**"
      - "playwright.electron.config.ts"
      - ".github/workflows/ci-e2e-electron.yml"

concurrency:
  group: ci-e2e-electron-${{ github.ref }}
  cancel-in-progress: true

jobs:
  electron-e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm ci` fallback covers npm/cli#4828 (platform optional-deps, incl. the
      # koffi optionalDependency). OS-split so the cleanup stays shell-correct.
      - name: Install dependencies (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: npm ci || (echo "npm ci failed (npm/cli#4828); clean install" && rm -rf node_modules package-lock.json && npm install)
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          npm ci
          if ($LASTEXITCODE -ne 0) {
            Write-Host "npm ci failed (npm/cli#4828); clean install"
            Remove-Item -Recurse -Force node_modules, package-lock.json -ErrorAction SilentlyContinue
            npm install
          }

      # Package the app for this OS (bundled Node skipped when absent; the E2E
      # attaches to a fake server, so no real server spawn is needed).
      - name: Package Electron app
        run: npm run -w packages/electron package

      # Electron needs Chromium's system libraries; ubuntu-latest images no
      # longer ship them all. install-deps pulls libnss3/libgbm/libatk/etc.
      # without downloading a browser binary (Electron uses its own).
      - name: Install Electron system libraries (Linux)
        if: runner.os == 'Linux'
        run: npx playwright install-deps chromium

      # ubuntu-24.04 (noble) blocks unprivileged user namespaces via AppArmor
      # (kernel.apparmor_restrict_unprivileged_userns=1), which breaks Chromium/
      # Electron launch even with --no-sandbox. Relax it for the runner.
      - name: Allow unprivileged user namespaces (Linux)
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      # Linux needs a virtual display (xvfb); Windows runners have a desktop
      # session, so Electron launches directly. Playwright uses the packaged
      # app's own Electron binary (no chromium download needed).
      - name: Run Electron E2E under xvfb (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:e2e:electron
        env:
          CI: "1"
      - name: Run Electron E2E (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: npm run test:e2e:electron
        env:
          CI: "1"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-electron-${{ matrix.os }}
          path: playwright-report-electron
          retention-days: 14

  # Job Object kill-on-close (task 7.4a) — spawn-mode (NOT the fake-server
  # attach specs): the app must boot a real server so the taskkill /F cascade
  # can be observed. Separate job so it never shares :8000 with the E2E specs.
  job-object-windows:
    runs-on: windows-latest
    # Advisory: exercising the Job Object cascade needs the packaged app's FULL
    # spawn path to boot a real server, which a lightweight `electron-forge
    # package` on a GHA runner does not reliably provide (INFRA: never brought a
    # server up). Deep real-launch validation belongs in the qa VM smoke
    # (qa/tests, cf. 08-electron-real-launch.sh). Kept here to attempt the
    # cascade + surface a true FAIL, without blocking the workflow.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: pwsh
        run: |
          npm ci
          if ($LASTEXITCODE -ne 0) {
            Write-Host "npm ci failed (npm/cli#4828); clean install"
            Remove-Item -Recurse -Force node_modules, package-lock.json -ErrorAction SilentlyContinue
            npm install
          }
      # Bundle Node so the packaged app can actually SPAWN a server (the attach
      # E2E jobs don't need this, but the Job Object cascade requires a real
      # server boot, not the execpath fallback). Mirrors _electron-build.yml.
      - name: Download Node.js binary (Windows)
        shell: pwsh
        run: |
          $version = (Select-String -Path packages/electron/scripts/_node-version.sh -Pattern 'BUNDLED_NODE_VERSION="([^"]+)"').Matches[0].Groups[1].Value
          $arch = "x64"
          $url = "https://nodejs.org/dist/$version/node-$version-win-$arch.zip"
          $outDir = "packages/electron/resources/node"
          New-Item -ItemType Directory -Force -Path $outDir
          Invoke-WebRequest -Uri $url -OutFile node.zip
          Expand-Archive -Path node.zip -DestinationPath temp-node
          Copy-Item "temp-node/node-$version-win-$arch/node.exe" "$outDir/"
          Copy-Item -Recurse "temp-node/node-$version-win-$arch/node_modules" "$outDir/"
          Remove-Item -Recurse -Force temp-node, node.zip
      - name: Package Electron app
        run: npm run -w packages/electron package
      - name: Job Object kill-on-close smoke (taskkill /F cascade)
        shell: pwsh
        run: npx tsx scripts/windows-job-object-smoke.ts
