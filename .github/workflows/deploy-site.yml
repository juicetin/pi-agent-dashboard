name: Deploy Site

on:
  push:
    branches: [develop]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"
  # Rebuild and redeploy whenever a new release is published so the
  # Download section surfaces the latest version automatically.
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check
        continue-on-error: true # don't block deploy on type-only issues

      - name: Build
        run: npm run build
        env:
          # Higher rate limit when fetching the latest release at build
          # time from src/lib/github-release.ts.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enforce JS bundle budget
        run: npm run size

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
