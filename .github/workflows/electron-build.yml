name: Electron Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          # Single macOS job — forge.config.ts forces universal (arm64+x64)
          - os: macos-14
            platform: darwin
            arch: arm64
            node-arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            node-arch: x64
          - os: windows-latest
            platform: win32
            arch: x64
            node-arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      # Linux: install system deps for DEB and AppImage makers
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg fakeroot libarchive-tools

      - name: Download Node.js binary (Unix)
        if: matrix.platform != 'win32'
        run: |
          cd packages/electron
          bash scripts/download-node.sh v22.12.0 ${{ matrix.platform }} ${{ matrix.node-arch }}

      - name: Download Node.js binary (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $version = "v22.12.0"
          $url = "https://nodejs.org/dist/$version/node-$version-win-x64.zip"
          $outDir = "packages/electron/resources/node"
          New-Item -ItemType Directory -Force -Path $outDir
          Invoke-WebRequest -Uri $url -OutFile node.zip
          Expand-Archive -Path node.zip -DestinationPath temp-node
          Copy-Item "temp-node/node-$version-win-x64/node.exe" "$outDir/"
          Copy-Item -Recurse "temp-node/node-$version-win-x64/node_modules" "$outDir/"
          Remove-Item -Recurse -Force temp-node, node.zip

      - name: Build client
        run: npm run build

      - name: Bundle dashboard server
        shell: bash
        run: bash packages/electron/scripts/bundle-server.sh

      - name: Make Electron distributables
        run: npm run electron:make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/electron/out/make/**/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: electron-*/**/*
          draft: true
