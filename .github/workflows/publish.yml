name: Release

# Two ways to fire this workflow:
#
#   1. Push a tag matching `v*`. The `prepare` job extracts the version
#      from the tag, then publish + electron + github-release run.
#
#   2. Click "Run workflow" in the GitHub Actions UI (workflow_dispatch)
#      and type the version string (e.g. "0.4.1"). The `prepare` job
#      bumps every workspace package.json, runs scripts/sync-versions.js,
#      promotes [Unreleased] in CHANGELOG.md to a dated [vX.Y.Z] section,
#      commits + tags + pushes the branch, then publish + electron +
#      github-release run against the freshly-pushed tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        type: string
        required: true

jobs:
  # ── prepare: resolve version + (on dispatch) bump + tag + push ────────────
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # Used on workflow_dispatch (commit + tag + push).
    outputs:
      version:       ${{ steps.resolve.outputs.version }}
      tag:           ${{ steps.resolve.outputs.tag }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so `git tag` can verify uniqueness against existing
          # tags. On tag-push we land on the tag's commit; on dispatch we
          # land on the branch the operator selected.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="${{ github.event.inputs.version }}"
            if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$ ]]; then
              echo "::error::'$version' is not valid semver (X.Y.Z[-prerelease])"
              exit 1
            fi
            if git ls-remote --tags origin "v$version" | grep -q "v$version$"; then
              echo "::error::tag v$version already exists on origin"
              exit 1
            fi
            tag="v$version"
          fi
          # Detect SemVer prerelease (anything with a `-` suffix on the
          # X.Y.Z core, e.g. `0.4.5-rc.1`). Prereleases publish to npm
          # under the `next` dist-tag and surface as GitHub `prerelease:
          # true` Releases. Stable versions keep `latest` + regular
          # Release. See change: eliminate-bash-on-windows-runners (D6).
          is_prerelease=$([[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+- ]] && echo true || echo false)
          echo "Resolved: version=$version tag=$tag is_prerelease=$is_prerelease"
          echo "version=$version"             >> "$GITHUB_OUTPUT"
          echo "tag=$tag"                     >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Bump versions, promote CHANGELOG, commit, tag, push
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          npm ci
          npm version "$VERSION" \
            --no-git-tag-version \
            --allow-same-version \
            --workspaces \
            --include-workspace-root
          node scripts/sync-versions.js

          today=$(date -u +%Y-%m-%d)
          if grep -qE "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md already contains a section for ${VERSION}"
            exit 1
          fi
          TODAY="$today" python3 - <<'PY'
          import os, re, pathlib
          version = os.environ["VERSION"]
          today = os.environ["TODAY"]
          p = pathlib.Path("CHANGELOG.md")
          src = p.read_text()
          replacement = (
              "## [Unreleased]\n\n"
              "### Added\n\n"
              "### Changed\n\n"
              "### Fixed\n\n"
              f"## [{version}] - {today}\n"
          )
          new = re.sub(r"^## \[Unreleased\]\s*\n", replacement, src, count=1, flags=re.MULTILINE)
          if new == src:
              raise SystemExit("Could not find '## [Unreleased]' heading in CHANGELOG.md")
          p.write_text(new)
          PY

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${VERSION}"

  # ── npm publish (OIDC / Trusted Publisher — no NPM_TOKEN secret) ──────────
  publish:
    needs: prepare
    runs-on: ubuntu-latest
    environment: npm-publish  # Matches npm Trusted Publisher config;
                              # acts as a required-reviewer gate if configured.
    permissions:
      contents: write
      id-token: write  # Required for OIDC token exchange with npm registry.
    steps:
      - uses: actions/checkout@v4
        with:
          # Always check out the resolved tag so dispatch-cut releases
          # publish the freshly-bumped tree, not the branch tip we may
          # have moved past.
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted Publishing requires npm CLI ≥ 11.5.1. Node 24 ships a recent
      # npm, but upgrade explicitly to guarantee the feature is available.
      - name: Upgrade npm to latest (trusted publishing)
        run: npm install -g npm@latest

      - run: npm ci

      - name: Set version from resolved tag
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version --workspaces --include-workspace-root

      - name: Sync inter-package dep specifiers to bumped version
        run: node scripts/sync-versions.js

      - run: npm run build

      - name: "Publish to npm (idempotent, ordered: sub-packages first, root last)"
        # Replaces the old `npm publish --workspaces --include-workspace-root` call.
        #
        # Why per-package loop instead of bulk --workspaces:
        #  1. Idempotency — already-published versions are skipped (so a re-run
        #     after a partial-publish failure resumes cleanly instead of failing
        #     on "cannot publish over previously published").
        #  2. Ordering — the root metapackage @blackbelt-technology/pi-agent-dashboard
        #     declares the sub-packages as dependencies; publishing it last
        #     ensures the registry already serves matching sub-package versions
        #     by the time the root tarball lands.
        #  3. Brand-new package isolation — @blackbelt-technology/dashboard-plugin-runtime
        #     has never been published; if Trusted Publisher / OIDC config is missing
        #     for it, the failure is contained without rolling back the 4 stable
        #     sub-package publishes that ran first.
        #
        # Failure mode: any single non-skip publish failure marks the whole step
        # failed (FAIL=1) but lets the loop finish so the logs show every
        # package's outcome.
        run: |
          set -uo pipefail
          PACKAGES=(
            "@blackbelt-technology/pi-dashboard-shared"
            "@blackbelt-technology/pi-dashboard-extension"
            "@blackbelt-technology/pi-dashboard-server"
            "@blackbelt-technology/pi-dashboard-web"
            "@blackbelt-technology/dashboard-plugin-runtime"
            "@blackbelt-technology/pi-agent-dashboard"
          )
          VERSION="${{ needs.prepare.outputs.version }}"
          PRERELEASE="${{ needs.prepare.outputs.is_prerelease }}"
          # Prereleases publish to the `next` dist-tag so consumers running
          # plain `npm install <pkg>` keep getting the last stable release.
          # Stable releases use the default `latest` dist-tag (no override).
          # See change: eliminate-bash-on-windows-runners (D6).
          TAG_ARG=""
          if [ "$PRERELEASE" = "true" ]; then TAG_ARG="--tag next"; fi
          FAIL=0
          for pkg in "${PACKAGES[@]}"; do
            if npm view "$pkg@$VERSION" version >/dev/null 2>&1; then
              echo "::notice::$pkg@$VERSION already published — skip"
              continue
            fi
            echo "::group::Publishing $pkg@$VERSION (is_prerelease=$PRERELEASE)"
            if [ "$pkg" = "@blackbelt-technology/pi-agent-dashboard" ]; then
              npm publish --provenance --access public $TAG_ARG || FAIL=1
            else
              npm publish --workspace="$pkg" --provenance --access public $TAG_ARG || FAIL=1
            fi
            echo "::endgroup::"
          done
          exit $FAIL

  # ── Electron builds (parallel) ────────────────────────────────
  # MUST `needs: [prepare, publish]` — the bundled server's `npm install`
  # in `bundle-server.mjs` resolves `@blackbelt-technology/*` sub-packages
  # from the public npm registry, which only have the just-bumped version
  # available after `publish` finishes uploading. Gating on `publish`
  # closes the ETARGET race that broke release run #34. See change:
  # publish-fix-macos. Locked by
  # `packages/shared/src/__tests__/publish-workflow-contract.test.ts`.
  electron:
    needs: [prepare, publish]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
            node-arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            node-arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            node-arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64
            node-arch: x64
          - os: windows-latest
            platform: win32
            arch: arm64
            node-arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci ${{ matrix.platform == 'linux' && matrix.arch == 'arm64' && '--ignore-scripts' || '' }}
        timeout-minutes: 15

      - name: Rebuild native modules (Linux arm64)
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        shell: bash
        run: |
          # phantomjs-prebuilt has no linux/arm64 binary and fails install scripts.
          # Use --ignore-scripts above, then rebuild only the modules we need.
          npm rebuild node-pty 2>&1 | tail -5 || true
          # Electron may be hoisted to root node_modules by npm workspaces,
          # or nested under packages/electron/node_modules. Resolve via the
          # tool-registry shell wrapper so layout changes are absorbed in
          # one place. See change: register-build-time-tools.
          ELECTRON_DIR=$(node packages/shared/bin/pi-dashboard-resolve-tool.cjs electron)
          echo "Electron dir: $ELECTRON_DIR"
          cd "$ELECTRON_DIR" && node install.js 2>&1 | tail -5

      - name: Set version from resolved tag
        # No `shell: bash` — single npm invocation works under cmd, pwsh,
        # and bash. Default Windows shell (cmd) handles it without MSYS.
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version --workspaces --include-workspace-root

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg fakeroot libarchive-tools libfuse2 squashfs-tools
          # AppImage is only supported on x64
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "SKIP_APPIMAGE=true" >> $GITHUB_ENV
          fi

      - name: Download Node.js binary (Unix)
        if: matrix.platform != 'win32'
        run: |
          cd packages/electron
          bash scripts/download-node.sh v22.12.0 ${{ matrix.platform }} ${{ matrix.node-arch }}

      - name: Download Node.js binary (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $version = "v22.12.0"
          $arch = "${{ matrix.node-arch }}"
          $url = "https://nodejs.org/dist/$version/node-$version-win-$arch.zip"
          $outDir = "packages/electron/resources/node"
          New-Item -ItemType Directory -Force -Path $outDir
          Invoke-WebRequest -Uri $url -OutFile node.zip
          Expand-Archive -Path node.zip -DestinationPath temp-node
          Copy-Item "temp-node/node-$version-win-$arch/node.exe" "$outDir/"
          Copy-Item -Recurse "temp-node/node-$version-win-$arch/node_modules" "$outDir/"
          Remove-Item -Recurse -Force temp-node, node.zip

      - name: Build client
        run: npm run build

      # ── Bundle first-party recommended extensions ───────────────────────────
      # Runs BEFORE bundle-server so resources/bundled-extensions/ is present
      # when forge packagerConfig.extraResource is evaluated. Opt-in via env.
      # Split per-OS: bash for POSIX, pwsh for Windows. The .mjs script is
      # OS-agnostic; only the tee+step-summary plumbing differs by shell.
      - name: Bundle first-party recommended extensions (POSIX)
        if: matrix.platform != 'win32'
        shell: bash
        env:
          BUNDLE_RECOMMENDED_EXTENSIONS: "1"
        run: |
          node --import tsx/esm packages/electron/scripts/bundle-recommended-extensions.mjs | tee bundle-extensions.log
          {
            echo "### Bundled recommended extensions (${{ matrix.platform }}/${{ matrix.arch }})";
            echo '```';
            cat bundle-extensions.log;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Bundle first-party recommended extensions (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        env:
          BUNDLE_RECOMMENDED_EXTENSIONS: "1"
        run: |
          node --import tsx/esm packages/electron/scripts/bundle-recommended-extensions.mjs | Tee-Object -FilePath bundle-extensions.log
          "### Bundled recommended extensions (${{ matrix.platform }}/${{ matrix.arch }})" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          '```' | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          Get-Content bundle-extensions.log | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          '```' | Add-Content -Path $env:GITHUB_STEP_SUMMARY

      # ── Bundle offline npm cache ────────────────────────────────────────────
      # Per-platform cacache that makes first-run install work fully offline.
      # Runs BEFORE bundle-server so the resource is present when
      # electron-forge evaluates extraResource. Opt-in via env.
      - name: Bundle offline npm cache (POSIX)
        if: matrix.platform != 'win32'
        shell: bash
        env:
          BUNDLE_OFFLINE_PACKAGES: "1"
        run: |
          node packages/electron/scripts/bundle-offline-packages.mjs \
            --platform=${{ matrix.platform }}-${{ matrix.arch }} \
            | tee bundle-offline.log
          SIZE=$(du -h packages/electron/resources/offline-packages/npm-cache.tar.gz | cut -f1)
          {
            echo "### Offline npm cache (${{ matrix.platform }}/${{ matrix.arch }})";
            echo "- tarball: $SIZE";
            echo '```';
            cat bundle-offline.log;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Bundle offline npm cache (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        env:
          BUNDLE_OFFLINE_PACKAGES: "1"
        run: |
          node packages/electron/scripts/bundle-offline-packages.mjs --platform=${{ matrix.platform }}-${{ matrix.arch }} | Tee-Object -FilePath bundle-offline.log
          $size = (Get-Item packages/electron/resources/offline-packages/npm-cache.tar.gz).Length
          $sizeH = if ($size -gt 1MB) { "{0:N1}M" -f ($size / 1MB) } else { "{0:N0}K" -f ($size / 1KB) }
          "### Offline npm cache (${{ matrix.platform }}/${{ matrix.arch }})" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          "- tarball: $sizeH" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          '```' | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          Get-Content bundle-offline.log | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          '```' | Add-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Bundle dashboard server
        # Node-native (.mjs) — no shell, no MSYS path translation, runs
        # identically on Linux/macOS/Windows. See change:
        # eliminate-bash-on-windows-runners.
        run: node packages/electron/scripts/bundle-server.mjs

      - name: Use x64 Node.js for Windows arm64 bundled server
        if: matrix.platform == 'win32' && matrix.arch == 'arm64'
        shell: pwsh
        run: |
          # node-pty has no win32-arm64 prebuilds, so bundle x64 Node.js + native modules
          # Windows ARM64 runs x64 binaries via emulation (WoW64)
          $version = "v22.12.0"
          $outDir = "packages/electron/resources/node"
          Remove-Item -Recurse -Force $outDir
          New-Item -ItemType Directory -Force -Path $outDir
          $url = "https://nodejs.org/dist/$version/node-$version-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile node-x64.zip
          Expand-Archive -Path node-x64.zip -DestinationPath temp-node-x64
          Copy-Item "temp-node-x64/node-$version-win-x64/node.exe" "$outDir/"
          Copy-Item -Recurse "temp-node-x64/node-$version-win-x64/node_modules" "$outDir/"
          Remove-Item -Recurse -Force temp-node-x64, node-x64.zip
          Write-Host "Bundled x64 Node.js for Windows ARM64 (runs via WoW64 emulation)"

      - name: Smoke assertion — offline bundle resources present
        # Gate before `forge make` so a missing bundle fails loudly rather
        # than producing a silently broken release artifact. Node-native
        # check so it runs identically on every OS without bash. See
        # change: eliminate-bash-on-windows-runners.
        run: |
          node -e "const fs=require('node:fs');const path=require('node:path');const dir=path.join('packages','electron','resources','offline-packages');const m=path.join(dir,'manifest.json');const t=path.join(dir,'npm-cache.tar.gz');if(!fs.existsSync(m)||!fs.existsSync(t)){console.error('::error::Offline bundle missing at '+dir+' (manifest='+m+', tarball='+t+')');try{console.error(fs.readdirSync(dir).join('\n'))}catch{}process.exit(1)}console.log('✓ offline bundle present:');for(const f of fs.readdirSync(dir)){const s=fs.statSync(path.join(dir,f));console.log('  '+f+' ('+s.size+' bytes)')}"

      - name: Patch AppImage maker script (Linux x64)
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        shell: bash
        run: |
          # Replace the broken patch-apprun.sh with our robust version
          cp packages/electron/scripts/patch-appimage-fix.sh \
            node_modules/@pengx17/electron-forge-maker-appimage/scripts/patch-apprun.sh

      - name: Make Electron distributables
        if: "!(matrix.platform == 'win32' && matrix.arch == 'arm64')"
        run: npm run electron:make -- --arch=${{ matrix.arch }}

      - name: Package Electron (Windows arm64 — no NSIS cross-compile)
        if: matrix.platform == 'win32' && matrix.arch == 'arm64'
        shell: pwsh
        run: |
          Set-Location packages\electron
          ..\..\node_modules\.bin\electron-forge.cmd package --arch=arm64 --platform=win32
          Write-Host "Packaged output:"
          Get-ChildItem out\ -ErrorAction SilentlyContinue | Format-Table

      - name: Build Windows ZIP and portable exe
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $packaged = Resolve-Path "packages/electron/out/PI-Dashboard-win32-$arch" -ErrorAction SilentlyContinue
          if (-not $packaged) {
            Write-Host "::error::Packaged directory not found. Contents of out/:"
            Get-ChildItem -Path "packages/electron/out/" -ErrorAction SilentlyContinue | Format-Table
            exit 1
          }
          Write-Host "Found packaged dir: $packaged"
          # ZIP archive
          $zipDir = "packages/electron/out/make/zip/$arch"
          New-Item -ItemType Directory -Force -Path $zipDir
          Compress-Archive -Path $packaged -DestinationPath "$zipDir/PI-Dashboard-win32-$arch.zip"
          # Portable exe via electron-builder
          cd packages/electron
          npx electron-builder --win portable --$arch `
            --prepackaged "out/PI-Dashboard-win32-$arch" `
            --config.appId=com.blackbelt-technology.pi-dashboard `
            --config.productName="PI Dashboard" `
            --config.directories.output="out/make/portable/$arch" `
            --config.portable.artifactName="PI-Dashboard-$arch-portable.exe" `
            --config.win.icon=resources/icon.ico

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/electron/out/make/**/*

  # ── GitHub Release (waits for all builds) ─────────────────────
  github-release:
    if: ${{ always() && needs.electron.result == 'success' }}
    needs: [prepare, publish, electron]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/download-artifact@v4

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          set -u
          version="${{ needs.prepare.outputs.version }}"
          echo "Extracting notes for version: ${version}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::warning::CHANGELOG.md not found — using fallback body"
            printf 'See [CHANGELOG.md](https://github.com/%s/blob/main/CHANGELOG.md) for full notes.\n' "${GITHUB_REPOSITORY}" > release-notes.md
            echo "fallback=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Capture content from '## [<version>]' up to (but not including) the next '## [' heading or EOF.
          awk -v ver="${version}" '
            BEGIN { found=0 }
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG section found for ${version} — using fallback body"
            printf 'See [CHANGELOG.md](https://github.com/%s/blob/main/CHANGELOG.md) for full notes.\n' "${GITHUB_REPOSITORY}" > release-notes.md
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          fi
          echo "--- release-notes.md ---"
          cat release-notes.md
          echo "--- end ---"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: electron-*/**/*
          body_path: release-notes.md
          generate_release_notes: ${{ steps.notes.outputs.fallback == 'true' }}
          draft: true
          # Prereleases (anything with a SemVer prerelease segment, e.g.
          # `0.4.5-rc.1`) surface as GitHub `prerelease: true` Releases
          # so they don't appear as the latest release on the repo page
          # and tooling that filters by prerelease state classifies them
          # correctly. The literal-string comparison is required because
          # Actions stringifies job outputs. See change:
          # eliminate-bash-on-windows-runners (D6).
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
