name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── npm publish ────────────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version --workspaces --include-workspace-root

      - name: Sync inter-package dep specifiers to bumped version
        run: node scripts/sync-versions.js

      - run: npm run build

      - name: Publish to npm (root + all non-private workspaces)
        run: npm publish --workspaces --include-workspace-root --provenance --access public

  # ── Electron builds (parallel) ────────────────────────────────
  electron:
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: darwin
            arch: arm64
            node-arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            node-arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            node-arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64
            node-arch: x64
          - os: windows-latest
            platform: win32
            arch: arm64
            node-arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci ${{ matrix.platform == 'linux' && matrix.arch == 'arm64' && '--ignore-scripts' || '' }}
        timeout-minutes: 15

      - name: Rebuild native modules (Linux arm64)
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        shell: bash
        run: |
          # phantomjs-prebuilt has no linux/arm64 binary and fails install scripts.
          # Use --ignore-scripts above, then rebuild only the modules we need.
          npm rebuild node-pty 2>&1 | tail -5 || true
          cd packages/electron/node_modules/electron && node install.js 2>&1 | tail -5

      - name: Set version from tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version --workspaces --include-workspace-root

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg fakeroot libarchive-tools libfuse2 squashfs-tools
          # AppImage is only supported on x64
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "SKIP_APPIMAGE=true" >> $GITHUB_ENV
          fi

      - name: Download Node.js binary (Unix)
        if: matrix.platform != 'win32'
        run: |
          cd packages/electron
          bash scripts/download-node.sh v22.12.0 ${{ matrix.platform }} ${{ matrix.node-arch }}

      - name: Download Node.js binary (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $version = "v22.12.0"
          $arch = "${{ matrix.node-arch }}"
          $url = "https://nodejs.org/dist/$version/node-$version-win-$arch.zip"
          $outDir = "packages/electron/resources/node"
          New-Item -ItemType Directory -Force -Path $outDir
          Invoke-WebRequest -Uri $url -OutFile node.zip
          Expand-Archive -Path node.zip -DestinationPath temp-node
          Copy-Item "temp-node/node-$version-win-$arch/node.exe" "$outDir/"
          Copy-Item -Recurse "temp-node/node-$version-win-$arch/node_modules" "$outDir/"
          Remove-Item -Recurse -Force temp-node, node.zip

      - name: Build client
        run: npm run build

      - name: Bundle first-party recommended extensions
        # Runs BEFORE bundle-server so resources/bundled-extensions/ is present
        # when forge packagerConfig.extraResource is evaluated. Opt-in via env.
        shell: bash
        env:
          BUNDLE_RECOMMENDED_EXTENSIONS: "1"
        run: |
          bash packages/electron/scripts/bundle-recommended-extensions.sh | tee bundle-extensions.log
          {
            echo "### Bundled recommended extensions (${{ matrix.platform }}/${{ matrix.arch }})";
            echo '```';
            cat bundle-extensions.log;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Bundle offline npm cache (pi + openspec + tsx)
        # Per-platform cacache that makes first-run install work fully offline.
        # Runs BEFORE bundle-server so the resource is present when
        # electron-forge evaluates extraResource. Opt-in via env.
        shell: bash
        env:
          BUNDLE_OFFLINE_PACKAGES: "1"
        run: |
          bash packages/electron/scripts/bundle-offline-packages.sh \
            --platform=${{ matrix.platform }}-${{ matrix.arch }} \
            | tee bundle-offline.log
          SIZE=$(du -h packages/electron/resources/offline-packages/npm-cache.tar.gz | cut -f1)
          {
            echo "### Offline npm cache (${{ matrix.platform }}/${{ matrix.arch }})";
            echo "- tarball: $SIZE";
            echo '```';
            cat bundle-offline.log;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Bundle dashboard server
        shell: bash
        run: bash packages/electron/scripts/bundle-server.sh

      - name: Use x64 Node.js for Windows arm64 bundled server
        if: matrix.platform == 'win32' && matrix.arch == 'arm64'
        shell: pwsh
        run: |
          # node-pty has no win32-arm64 prebuilds, so bundle x64 Node.js + native modules
          # Windows ARM64 runs x64 binaries via emulation (WoW64)
          $version = "v22.12.0"
          $outDir = "packages/electron/resources/node"
          Remove-Item -Recurse -Force $outDir
          New-Item -ItemType Directory -Force -Path $outDir
          $url = "https://nodejs.org/dist/$version/node-$version-win-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile node-x64.zip
          Expand-Archive -Path node-x64.zip -DestinationPath temp-node-x64
          Copy-Item "temp-node-x64/node-$version-win-x64/node.exe" "$outDir/"
          Copy-Item -Recurse "temp-node-x64/node-$version-win-x64/node_modules" "$outDir/"
          Remove-Item -Recurse -Force temp-node-x64, node-x64.zip
          Write-Host "Bundled x64 Node.js for Windows ARM64 (runs via WoW64 emulation)"

      - name: Smoke assertion — offline bundle resources present
        # Gate before `forge make` so a missing bundle fails loudly rather
        # than producing a silently broken release artifact.
        shell: bash
        run: |
          DIR=packages/electron/resources/offline-packages
          if [ ! -f "$DIR/manifest.json" ] || [ ! -f "$DIR/npm-cache.tar.gz" ]; then
            echo "::error::Offline bundle missing at $DIR (manifest=${DIR}/manifest.json, tarball=${DIR}/npm-cache.tar.gz)"
            ls -la "$DIR" 2>&1 || true
            exit 1
          fi
          echo "✓ offline bundle present:"
          ls -la "$DIR"

      - name: Patch AppImage maker script (Linux x64)
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        shell: bash
        run: |
          # Replace the broken patch-apprun.sh with our robust version
          cp packages/electron/scripts/patch-appimage-fix.sh \
            node_modules/@pengx17/electron-forge-maker-appimage/scripts/patch-apprun.sh

      - name: Make Electron distributables
        if: "!(matrix.platform == 'win32' && matrix.arch == 'arm64')"
        run: npm run electron:make -- --arch=${{ matrix.arch }}

      - name: Package Electron (Windows arm64 — no NSIS cross-compile)
        if: matrix.platform == 'win32' && matrix.arch == 'arm64'
        shell: bash
        run: |
          cd packages/electron
          ../../node_modules/.bin/electron-forge package --arch=arm64 --platform=win32
          echo "Packaged output:"
          ls -la out/ || true

      - name: Build Windows ZIP and portable exe
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $packaged = Resolve-Path "packages/electron/out/PI-Dashboard-win32-$arch" -ErrorAction SilentlyContinue
          if (-not $packaged) {
            Write-Host "::error::Packaged directory not found. Contents of out/:"
            Get-ChildItem -Path "packages/electron/out/" -ErrorAction SilentlyContinue | Format-Table
            exit 1
          }
          Write-Host "Found packaged dir: $packaged"
          # ZIP archive
          $zipDir = "packages/electron/out/make/zip/$arch"
          New-Item -ItemType Directory -Force -Path $zipDir
          Compress-Archive -Path $packaged -DestinationPath "$zipDir/PI-Dashboard-win32-$arch.zip"
          # Portable exe via electron-builder
          cd packages/electron
          npx electron-builder --win portable --$arch `
            --prepackaged "out/PI-Dashboard-win32-$arch" `
            --config.appId=com.blackbelt-technology.pi-dashboard `
            --config.productName="PI Dashboard" `
            --config.directories.output="out/make/portable/$arch" `
            --config.portable.artifactName="PI-Dashboard-$arch-portable.exe" `
            --config.win.icon=resources/icon.ico

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}-${{ matrix.arch }}
          path: packages/electron/out/make/**/*

  # ── GitHub Release (waits for all builds) ─────────────────────
  github-release:
    if: always() && needs.electron.result == 'success'
    needs: [publish, electron]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          set -u
          version="${GITHUB_REF_NAME#v}"
          echo "Extracting notes for version: ${version}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::warning::CHANGELOG.md not found — using fallback body"
            printf 'See [CHANGELOG.md](https://github.com/%s/blob/main/CHANGELOG.md) for full notes.\n' "${GITHUB_REPOSITORY}" > release-notes.md
            echo "fallback=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Capture content from '## [<version>]' up to (but not including) the next '## [' heading or EOF.
          awk -v ver="${version}" '
            BEGIN { found=0 }
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG section found for ${version} — using fallback body"
            printf 'See [CHANGELOG.md](https://github.com/%s/blob/main/CHANGELOG.md) for full notes.\n' "${GITHUB_REPOSITORY}" > release-notes.md
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          fi
          echo "--- release-notes.md ---"
          cat release-notes.md
          echo "--- end ---"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: electron-*/**/*
          body_path: release-notes.md
          generate_release_notes: ${{ steps.notes.outputs.fallback == 'true' }}
          draft: true
