name: Release

# Two ways to fire this workflow:
#
#   1. Push a tag matching `v*`. The `resolve` job extracts the version
#      from the tag, the release-gate (`ci-checks` + `smoke`) runs,
#      `tag-and-push` is SKIPPED (the tag is already present), then
#      publish + electron + github-release run.
#
#   2. Click "Run workflow" in the GitHub Actions UI (workflow_dispatch)
#      and type the version string (e.g. "0.4.1"). The `resolve` job
#      resolves the version string, the release-gate runs against the
#      branch HEAD sha, then `tag-and-push` bumps every workspace
#      package.json, runs scripts/sync-versions.js, promotes [Unreleased]
#      in CHANGELOG.md to a dated [vX.Y.Z] section, commits + tags +
#      pushes the branch, then publish + electron + github-release run
#      against the freshly-pushed tag.
#
# See change: gate-publish-on-smoke-and-tests.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        type: string
        required: true

jobs:
  # ── resolve: pure version resolution (no side effects) ────────────────────
  # Splits the legacy monolithic `prepare` job. The bump/commit/tag/push
  # steps moved to `tag-and-push` (runs only on workflow_dispatch). The
  # `outputs.ref` is the sha the release-gate will test — `github.sha` on
  # both paths (the tag's commit on tag-push, the branch HEAD on dispatch).
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version:       ${{ steps.resolve.outputs.version }}
      tag:           ${{ steps.resolve.outputs.tag }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
      ref:           ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="${{ github.event.inputs.version }}"
            if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$ ]]; then
              echo "::error::'$version' is not valid semver (X.Y.Z[-prerelease])"
              exit 1
            fi
            if git ls-remote --tags origin "v$version" | grep -q "v$version$"; then
              echo "::error::tag v$version already exists on origin"
              exit 1
            fi
            tag="v$version"
          fi
          # Detect SemVer prerelease (anything with a `-` suffix on the
          # X.Y.Z core, e.g. `0.4.5-rc.1`). Prereleases publish to npm
          # under the `next` dist-tag and surface as GitHub `prerelease:
          # true` Releases. Stable versions keep `latest` + regular
          # Release. See change: eliminate-bash-on-windows-runners (D6).
          is_prerelease=$([[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+- ]] && echo true || echo false)
          echo "Resolved: version=$version tag=$tag is_prerelease=$is_prerelease"
          echo "version=$version"             >> "$GITHUB_OUTPUT"
          echo "tag=$tag"                     >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

  # ── release-gate: ci-checks (lint+test+build) ─────────────────────────────
  # Mirrors `ci.yml`'s `ci` job, but runs at release time against the
  # resolved ref. Fans out in parallel with `smoke`. See change:
  # gate-publish-on-smoke-and-tests.
  ci-checks:
    needs: [resolve]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  # ── release-gate: smoke (standalone-install-smoke matrix) ─────────────────
  # Calls the reusable `_smoke.yml` with the resolved ref. Fans out in
  # parallel with `ci-checks`. See change: gate-publish-on-smoke-and-tests.
  smoke:
    needs: [resolve]
    uses: ./.github/workflows/_smoke.yml
    with:
      ref: ${{ needs.resolve.outputs.ref }}

  # ── tag-and-push: bump + commit + tag + push (dispatch only) ──────────────
  # Runs ONLY on workflow_dispatch. On tag-push entry the tag is already
  # present; this job is skipped and downstream `needs:` treat the skip as
  # success. Runs AFTER the release-gate (`ci-checks` + `smoke`) so a
  # failing gate leaves no commit, no tag, no npm artifact. See change:
  # gate-publish-on-smoke-and-tests.
  tag-and-push:
    needs: [resolve, ci-checks, smoke]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Bump workspace versions
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          npm version "$VERSION" \
            --no-git-tag-version \
            --allow-same-version \
            --workspaces \
            --include-workspace-root

      - name: Sync inter-package dep specifiers
        shell: bash
        run: node scripts/sync-versions.js

      - name: Regenerate package-lock.json with bumped versions
        shell: bash
        run: |
          # The workspace symlink graph changed (every package.json's
          # version + cross-ref specifiers were bumped). The lockfile
          # must be regenerated so its recorded specifiers match,
          # otherwise strict prerelease semver causes npm ci on consumers
          # to fall back to the registry on every install. See change:
          # fix-release-lockfile-drift.
          npm install --package-lock-only --no-audit --no-fund

      - name: Verify lockfile matches workspace versions
        shell: bash
        run: node scripts/verify-lockfile-versions.mjs

      - name: Promote CHANGELOG, commit, tag, push
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          today=$(date -u +%Y-%m-%d)
          if grep -qE "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md already contains a section for ${VERSION}"
            exit 1
          fi
          TODAY="$today" python3 - <<'PY'
          import os, re, pathlib
          version = os.environ["VERSION"]
          today = os.environ["TODAY"]
          p = pathlib.Path("CHANGELOG.md")
          src = p.read_text()
          replacement = (
              "## [Unreleased]\n\n"
              "### Added\n\n"
              "### Changed\n\n"
              "### Fixed\n\n"
              f"## [{version}] - {today}\n"
          )
          new = re.sub(r"^## \[Unreleased\]\s*\n", replacement, src, count=1, flags=re.MULTILINE)
          if new == src:
              raise SystemExit("Could not find '## [Unreleased]' heading in CHANGELOG.md")
          p.write_text(new)
          PY

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${VERSION}"

  # ── npm publish (OIDC / Trusted Publisher — no NPM_TOKEN secret) ──────────
  # `needs:` includes the full release-gate (`ci-checks` + `smoke`) plus
  # `tag-and-push`. On tag-push entry `tag-and-push` is skipped; GitHub
  # Actions treats a skipped `needs:` as blocking unless the dependent
  # job has an explicit `if:` that evaluates `needs.*.result`. The `if:`
  # below allows `tag-and-push` to be either `success` (dispatch path)
  # or `skipped` (tag-push path), while still requiring `ci-checks` and
  # `smoke` to be green. See change: gate-publish-on-smoke-and-tests.
  publish:
    needs: [resolve, ci-checks, smoke, tag-and-push]
    if: >-
      ${{ !cancelled()
      && needs.ci-checks.result == 'success'
      && needs.smoke.result == 'success'
      && (needs.tag-and-push.result == 'success' || needs.tag-and-push.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: npm-publish  # Matches npm Trusted Publisher config;
                              # acts as a required-reviewer gate if configured.
    permissions:
      contents: write
      id-token: write  # Required for OIDC token exchange with npm registry.
    steps:
      - uses: actions/checkout@v4
        with:
          # Always check out the resolved tag so dispatch-cut releases
          # publish the freshly-bumped tree, not the branch tip we may
          # have moved past.
          ref: ${{ needs.resolve.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted Publishing requires npm CLI ≥ 11.5.1. Node 24 ships a recent
      # npm, but upgrade explicitly to guarantee the feature is available.
      - name: Upgrade npm to latest (trusted publishing)
        run: npm install -g npm@latest

      - run: npm ci

      - name: Set version from resolved tag
        run: npm version "${{ needs.resolve.outputs.version }}" --no-git-tag-version --allow-same-version --workspaces --include-workspace-root

      - name: Sync inter-package dep specifiers to bumped version
        run: node scripts/sync-versions.js

      - run: npm run build

      - name: "Publish to npm (idempotent, ordered: sub-packages first, root last)"
        # Replaces the old `npm publish --workspaces --include-workspace-root` call.
        #
        # Why per-package loop instead of bulk --workspaces:
        #  1. Idempotency — already-published versions are skipped (so a re-run
        #     after a partial-publish failure resumes cleanly instead of failing
        #     on "cannot publish over previously published").
        #  2. Ordering — the root metapackage @blackbelt-technology/pi-agent-dashboard
        #     declares the sub-packages as dependencies; publishing it last
        #     ensures the registry already serves matching sub-package versions
        #     by the time the root tarball lands.
        #  3. Brand-new package isolation — @blackbelt-technology/dashboard-plugin-runtime
        #     has never been published; if Trusted Publisher / OIDC config is missing
        #     for it, the failure is contained without rolling back the 4 stable
        #     sub-package publishes that ran first.
        #
        # Failure mode: any single non-skip publish failure marks the whole step
        # failed (FAIL=1) but lets the loop finish so the logs show every
        # package's outcome.
        run: |
          set -uo pipefail
          # Ordering invariant: a package MUST appear AFTER every
          # @blackbelt-technology/* package it depends on, so the registry
          # already serves the matching version when the consumer publishes.
          # The root metapackage is published LAST. See contract test
          # packages/shared/src/__tests__/publish-allowlist-complete.test.ts
          # which enforces every non-private workspace appears here.
          PACKAGES=(
            "@blackbelt-technology/pi-dashboard-shared"
            "@blackbelt-technology/pi-dashboard-extension"
            "@blackbelt-technology/pi-dashboard-server"
            "@blackbelt-technology/pi-dashboard-web"
            "@blackbelt-technology/dashboard-plugin-runtime"
            "@blackbelt-technology/pi-dashboard-client-utils"
            "@blackbelt-technology/pi-dashboard-flows-plugin"
            "@blackbelt-technology/pi-dashboard-plugin-skill"
            "@blackbelt-technology/pi-dashboard-roles-plugin"
            "@blackbelt-technology/pi-dashboard-flows-anthropic-bridge-plugin"
            "@blackbelt-technology/pi-dashboard-subagents-plugin"
            "@blackbelt-technology/pi-dashboard-goal-plugin"
            "@blackbelt-technology/pi-dashboard-automation-plugin"
            "@blackbelt-technology/pi-image-fit-extension"
            "@blackbelt-technology/frontend-mockup-loop"
            "@blackbelt-technology/pi-dashboard-kb"
            "@blackbelt-technology/pi-dashboard-kb-extension"
            "@blackbelt-technology/pi-dashboard-kb-plugin"
            "@blackbelt-technology/pi-dashboard-document-converter"
            "@blackbelt-technology/anti-slop-frontend"
            "@blackbelt-technology/pi-dashboard-eng-disciplines"
            "@blackbelt-technology/pi-dashboard-authoring-toolkit"
            "@blackbelt-technology/pi-dashboard-video-transcription"
            "@blackbelt-technology/pi-dashboard-session-distiller"
            "@blackbelt-technology/pi-dashboard-distill-session-knowledge"
            "@blackbelt-technology/pi-agent-dashboard"
          )
          VERSION="${{ needs.resolve.outputs.version }}"
          PRERELEASE="${{ needs.resolve.outputs.is_prerelease }}"
          # Prereleases publish to the `next` dist-tag so consumers running
          # plain `npm install <pkg>` keep getting the last stable release.
          # Stable releases use the default `latest` dist-tag (no override).
          # See change: eliminate-bash-on-windows-runners (D6).
          TAG_ARG=""
          if [ "$PRERELEASE" = "true" ]; then TAG_ARG="--tag next"; fi
          FAIL=0
          for pkg in "${PACKAGES[@]}"; do
            if npm view "$pkg@$VERSION" version >/dev/null 2>&1; then
              echo "::notice::$pkg@$VERSION already published — skip"
              continue
            fi
            echo "::group::Publishing $pkg@$VERSION (is_prerelease=$PRERELEASE)"
            if [ "$pkg" = "@blackbelt-technology/pi-agent-dashboard" ]; then
              npm publish --provenance --access public $TAG_ARG || FAIL=1
            else
              npm publish --workspace="$pkg" --provenance --access public $TAG_ARG || FAIL=1
            fi
            echo "::endgroup::"
          done
          exit $FAIL

  # ── Electron builds (parallel) ────────────────────────────────
  # MUST `needs: [resolve, publish]` — the bundled server's `npm install`
  # in `bundle-server.mjs` resolves `@blackbelt-technology/*` sub-packages
  # from the public npm registry, which only have the just-bumped version
  # available after `publish` finishes uploading. Gating on `publish`
  # closes the ETARGET race that broke release run #34. See change:
  # publish-fix-macos. Locked by
  # `packages/shared/src/__tests__/publish-workflow-contract.test.ts`.
  electron:
    needs: [resolve, publish]
    # All matrix/steps moved to .github/workflows/_electron-build.yml so the
    # same definition serves both this release flow AND the on-demand CI
    # workflow (.github/workflows/ci-electron.yml). See change:
    # add-ci-electron-on-demand-build.
    #
    # CRITICAL: do NOT remove `needs: [resolve, publish]` — the registry-
    # availability gate is still required for release builds (the bundled
    # server's `npm install` resolves @blackbelt-technology/* from npm).
    # See packages/shared/src/__tests__/publish-workflow-contract.test.ts.
    uses: ./.github/workflows/_electron-build.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
      ref:     ${{ needs.resolve.outputs.tag }}
      legs:                    all
      source_only_bundle:      false
      artifact_retention_days: 90

  # ── GitHub Release (waits for all builds) ─────────────────────
  github-release:
    if: ${{ always() && needs.electron.result == 'success' }}
    needs: [resolve, publish, electron]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - uses: actions/download-artifact@v4

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          set -u
          version="${{ needs.resolve.outputs.version }}"
          echo "Extracting notes for version: ${version}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::warning::CHANGELOG.md not found — using fallback body"
            printf 'See [CHANGELOG.md](https://github.com/%s/blob/main/CHANGELOG.md) for full notes.\n' "${GITHUB_REPOSITORY}" > release-notes.md
            echo "fallback=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Capture content from '## [<version>]' up to (but not including) the next '## [' heading or EOF.
          awk -v ver="${version}" '
            BEGIN { found=0 }
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG section found for ${version} — using fallback body"
            printf 'See [CHANGELOG.md](https://github.com/%s/blob/main/CHANGELOG.md) for full notes.\n' "${GITHUB_REPOSITORY}" > release-notes.md
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          fi
          # Append the static first-launch-unblocking footer (Windows
          # SmartScreen + macOS Gatekeeper workarounds) so every release —
          # whether the body comes from CHANGELOG.md or the GitHub-generated
          # fallback — surfaces the workarounds for unsigned/un-notarized
          # binaries. Edit `.github/release-notes-footer.md` to update;
          # delete the file (or this step) once Authenticode signing AND
          # macOS notarization both ship. See changes:
          # `windows-authenticode-signing`, `macos-notarization` (planned).
          if [ -f .github/release-notes-footer.md ]; then
            printf '\n\n' >> release-notes.md
            cat .github/release-notes-footer.md >> release-notes.md
          fi
          echo "--- release-notes.md ---"
          cat release-notes.md
          echo "--- end ---"

      - name: Drop builder-debug logs (avoid asset basename collision)
        # Each electron matrix leg emits a builder-debug.yml; multiple
        # legs uploading the same basename cause softprops/action-gh-release
        # to 404 on the asset-update API, failing the step even though all
        # real artifacts uploaded successfully. The debug logs are not
        # user-facing release artifacts.
        run: find electron-* -name builder-debug.yml -delete || true

      # The arm64 + x64 macOS legs each emit their own latest-mac.yml (one DMG
      # in files[]). softprops dedups release assets by basename, so without a
      # merge one arch's metadata silently overwrites the other's. Merge into a
      # single latest-mac.yml whose files[] lists every DMG, and drop the
      # duplicates so only the merged file uploads.
      # See change: fix-electron-auto-update-pipeline (ci-cd-pipeline spec).
      # ⚠️ CI-VALIDATE: confirm electron-updater resolves the merged file on a
      # native arm64 Mac (picks the right files[] entry).
      - name: Merge macOS update metadata (arm64 + x64 → one latest-mac.yml)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t MAC_YML < <(find electron-darwin-* -name 'latest-mac.yml' 2>/dev/null || true)
          if [ "${#MAC_YML[@]}" -le 1 ]; then
            echo "${#MAC_YML[@]} latest-mac.yml found — no merge needed"; exit 0
          fi
          python3 -m pip install --quiet pyyaml
          python3 - "${MAC_YML[@]}" <<'PY'
          import sys, os, yaml
          paths = sys.argv[1:]
          merged, seen, files = None, set(), []
          for p in paths:
              with open(p) as fh:
                  d = yaml.safe_load(fh)
              if merged is None:
                  merged = dict(d)
              for fe in d.get("files", []):
                  if fe["url"] not in seen:
                      seen.add(fe["url"]); files.append(fe)
          merged["files"] = files
          # path/sha512 mirror the first file for single-file legacy readers.
          merged["path"] = files[0]["url"]
          merged["sha512"] = files[0]["sha512"]
          with open(paths[0], "w") as fh:
              yaml.safe_dump(merged, fh, sort_keys=False)
          for extra in paths[1:]:
              os.remove(extra)
          print(f"Merged {len(files)} macOS file(s) into {paths[0]}")
          PY

      # Fail the release if any platform produced an installer but no matching
      # update-metadata file — a partial upload would brick that platform's
      # auto-update channel. See change: fix-electron-auto-update-pipeline.
      - name: Assert update metadata present for each installer
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          check() { # <installer-glob> <metadata-name> <label>
            if find electron-* -type f -name "$1" 2>/dev/null | grep -q .; then
              if ! find electron-* -type f -name "$2" 2>/dev/null | grep -q .; then
                echo "::error::$3 installer present but $2 is missing"; fail=1
              fi
            fi
          }
          check '*.exe' 'latest.yml' 'Windows'
          check '*.dmg' 'latest-mac.yml' 'macOS'
          check '*.AppImage' 'latest-linux.yml' 'Linux'
          exit $fail

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          files: electron-*/**/*
          body_path: release-notes.md
          generate_release_notes: ${{ steps.notes.outputs.fallback == 'true' }}
          # Production tags (no SemVer prerelease segment) publish immediately so
          # electron-updater's default GitHub provider — which queries
          # /releases/latest and excludes drafts — can resolve them. Pre-release
          # tags stay drafts so a maintainer can eyeball artifacts before
          # flipping to published. See change: fix-electron-auto-update-pipeline
          # (ci-cd-pipeline spec: "Production tags publish GitHub Releases").
          draft: ${{ needs.resolve.outputs.is_prerelease == 'true' }}
          # Prereleases (anything with a SemVer prerelease segment, e.g.
          # `0.4.5-rc.1`) surface as GitHub `prerelease: true` Releases
          # so they don't appear as the latest release on the repo page
          # and tooling that filters by prerelease state classifies them
          # correctly. The literal-string comparison is required because
          # Actions stringifies job outputs. See change:
          # eliminate-bash-on-windows-runners (D6).
          prerelease: ${{ needs.resolve.outputs.is_prerelease == 'true' }}
