name: Release trigger (manual)

# Manually-triggered release — mirrors the judo-ng release dispatch pattern.
#
# Computes the next version (auto-bumps patch from root package.json by
# default, or uses the value the operator types into the dispatch UI),
# bumps every workspace package.json, syncs cross-ref specifiers via
# scripts/sync-versions.js, promotes the [Unreleased] section in
# CHANGELOG.md to the new version, commits + tags + pushes — which
# triggers the existing tag-driven `Release` workflow (publish.yml) to
# build & publish artifacts.
#
# Inputs:
#   version    — Semver string (e.g. "0.4.1") or "Auto" to bump patch.
#                Must NOT equal an already-published tag.
#   prerelease — When true, marks GitHub Release as prerelease in the
#                downstream publish workflow (consumed via tag suffix
#                detection in CHANGELOG; informational only here).
#   dry_run    — When true, computes and prints everything but does not
#                commit, tag, or push. Useful for verifying inputs.
#
# Effect on success:
#   - develop receives a new "chore(release): vX.Y.Z" commit
#   - tag vX.Y.Z is pushed
#   - .github/workflows/publish.yml fires on the tag push and
#     publishes npm + Electron artifacts + drafts a GitHub Release
#
# This workflow does NOT publish anything itself. It is a release-cut
# orchestrator only. The actual publishing path remains tag-driven.

on:
  workflow_dispatch:
    inputs:
      version:
        description: |
          Version to release (e.g. "0.4.1"). Use "Auto" to bump the patch
          from the current root package.json version.
        type: string
        required: false
        default: "Auto"
      prerelease:
        description: |
          Mark this release as a prerelease (GitHub Release flag). For
          tagged prereleases, prefer using a -rc.N / -beta.N suffix on
          the version itself; this flag is purely informational.
        type: boolean
        required: false
        default: false
      dry_run:
        description: |
          When true, compute the version + show the diff, but do NOT
          commit, tag, or push. Use this to validate inputs safely.
        type: boolean
        required: false
        default: false

permissions:
  # Required to create the release commit + push the tag back to develop.
  contents: write

jobs:
  cut-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          # Need full history so `git tag` can verify uniqueness.
          fetch-depth: 0
          # Use a token that can push back to develop. GITHUB_TOKEN works
          # because permissions.contents=write is granted above.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute target version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          requested='${{ github.event.inputs.version }}'
          current=$(node -p "require('./package.json').version")
          echo "Current root version: $current"
          echo "Requested input:      $requested"

          if [[ -z "$requested" || "$requested" == "Auto" ]]; then
            # Bump patch: M.N.P → M.N.(P+1)
            next=$(node -e "
              const v=require('./package.json').version.replace(/-.*$/,'');
              const [M,N,P]=v.split('.').map(n=>parseInt(n,10));
              if (Number.isNaN(M)||Number.isNaN(N)||Number.isNaN(P)) {
                process.stderr.write('Cannot parse current version: '+v+'\n');
                process.exit(1);
              }
              process.stdout.write(\`\${M}.\${N}.\${P+1}\`);
            ")
            echo "Auto-bumped to:       $next"
          else
            next="$requested"
            echo "Using requested:      $next"
          fi

          # Validate semver (loose: M.N.P with optional prerelease/build).
          if ! [[ "$next" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::'$next' is not a valid semver string"
            exit 1
          fi

          # Reject if tag already exists locally OR on origin.
          if git rev-parse "v$next" >/dev/null 2>&1; then
            echo "::error::tag v$next already exists locally"
            exit 1
          fi
          if git ls-remote --tags origin "v$next" | grep -q "v$next$"; then
            echo "::error::tag v$next already exists on origin"
            exit 1
          fi

          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"

      - name: Run lint + tests + build (gate)
        # Same gate the release-cut skill enforces locally. Refuses to
        # cut if develop is broken.
        shell: bash
        run: |
          set -euo pipefail
          npm run lint
          npm test
          npm run build

      - name: Bump workspace package.json versions
        shell: bash
        run: |
          set -euo pipefail
          npm version "${{ steps.version.outputs.version }}" \
            --no-git-tag-version \
            --allow-same-version \
            --workspaces \
            --include-workspace-root

      - name: Sync inter-package dep specifiers
        shell: bash
        run: node scripts/sync-versions.js

      - name: Promote CHANGELOG [Unreleased] section
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          today=$(date -u +%Y-%m-%d)
          # Replace the FIRST occurrence of `## [Unreleased]` with a fresh
          # empty Unreleased block followed by the new versioned heading.
          # Idempotent: if a section for the version already exists, we
          # bail out loudly rather than duplicating it.
          if grep -qE "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md already contains a section for ${VERSION}"
            exit 1
          fi
          # Pass version + date via env so python's heredoc body has no
          # bash interpolation surprises (PY heredoc is unquoted to keep
          # GitHub Actions expression substitution available elsewhere).
          TODAY="$today" python3 - <<'PY'
          import os, re, pathlib
          version = os.environ["VERSION"]
          today = os.environ["TODAY"]
          p = pathlib.Path("CHANGELOG.md")
          src = p.read_text()
          replacement = (
              "## [Unreleased]\n\n"
              "### Added\n\n"
              "### Changed\n\n"
              "### Fixed\n\n"
              f"## [{version}] - {today}\n"
          )
          new = re.sub(r"^## \[Unreleased\]\s*\n", replacement, src, count=1, flags=re.MULTILINE)
          if new == src:
              raise SystemExit("Could not find '## [Unreleased]' heading in CHANGELOG.md")
          p.write_text(new)
          PY

      - name: Show planned diff (dry-run preview)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        shell: bash
        run: |
          echo "=== files staged for release commit ==="
          git status --short
          echo ""
          echo "=== diff summary ==="
          git diff --stat
          echo ""
          echo "=== first 200 lines of full diff ==="
          git diff | head -200
          echo ""
          echo "::warning::dry_run=true — NOT committing, NOT tagging, NOT pushing."

      - name: Commit, tag, and push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin develop
          git push origin "v${VERSION}"

      - name: Summary
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          {
            echo "### Release trigger result"
            echo ""
            echo "- **Version:**     \`v${VERSION}\`"
            echo "- **Prerelease:**  ${PRERELEASE}"
            echo "- **Dry run:**     ${DRY_RUN}"
            echo ""
            if [ "${DRY_RUN}" = "true" ]; then
              echo "Dry run completed — nothing was committed, tagged, or pushed."
            else
              echo "Release commit and tag pushed. The existing tag-driven \`Release\`"
              echo "workflow (\`.github/workflows/publish.yml\`) will pick up \`v${VERSION}\`"
              echo "and publish artifacts shortly."
              echo ""
              echo "Track the publish run here:"
              echo "https://github.com/${{ github.repository }}/actions/workflows/publish.yml"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
