name: Sync Release Version

# Writes the latest release metadata into
# `site/src/data/latest-release.json` and commits it to main.
#
# Triggers:
#   - `release: { types: [published, edited] }` — the normal path.
#   - `workflow_dispatch` — manual refresh (e.g. after retroactively
#     editing a release).
#
# After committing, the regular `deploy-site.yml` workflow picks up the
# change via its `paths: ["site/**"]` filter and redeploys automatically.

on:
  release:
    types: [published, edited]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-release-version
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token that can push back to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest release and write cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p site/src/data

          echo "Fetching latest release for $REPO"
          gh api "repos/$REPO/releases/latest" --jq '{
            "$comment": "Auto-updated by .github/workflows/sync-release-version.yml on every release. Do not edit manually.",
            tagName: .tag_name,
            name: (.name // .tag_name),
            url: .html_url,
            publishedAt: .published_at,
            assets: [.assets[] | {
              name: .name,
              url: .browser_download_url,
              size: .size,
              downloadCount: .download_count
            }]
          }' > site/src/data/latest-release.json

          echo "Wrote:"
          cat site/src/data/latest-release.json | head -20

      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet site/src/data/latest-release.json; then
            echo "No change — skipping commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add site/src/data/latest-release.json
          git commit -m "chore(site): sync latest-release.json to ${GITHUB_REF_NAME:-manual-refresh}"
          git push origin HEAD:main
