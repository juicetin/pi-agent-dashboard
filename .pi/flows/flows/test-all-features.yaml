name: test-all-features
description: Comprehensive test of all flow features — agents generate codes that downstream agents validate
max_concurrent: 4
task_required: false

steps:
  # ═══════════════════════════════════════════════════════
  # PHASE 1: Basic Agent + Result Interpolation
  # ═══════════════════════════════════════════════════════

  - id: basic-gen
    agent: test-code-generator
    task: Generate a verification code for the basic agent step test

  - id: basic-validate
    agent: test-code-validator
    blockedBy: [basic-gen]
    inputs:
      expected_codes: "Basic code from summary: ${{result.basic-gen.summary}} — artifacts: ${{result.basic-gen.artifacts}}"
      source_description: "PHASE 1: Basic agent step with result interpolation (summary + artifacts)"
    task: Validate the code from the basic generator. Check both summary and artifacts contain a matching hex code.

  # ═══════════════════════════════════════════════════════
  # PHASE 2: Parallel Execution + Fan-In
  # ═══════════════════════════════════════════════════════

  - id: parallel-a
    agent: test-code-generator
    task: Generate verification code A for the parallel execution test

  - id: parallel-b
    agent: test-code-generator
    task: Generate verification code B for the parallel execution test

  - id: parallel-c
    agent: test-code-generator
    task: Generate verification code C for the parallel execution test

  - id: fanin-validate
    agent: test-code-validator
    blockedBy: [parallel-a, parallel-b, parallel-c]
    inputs:
      expected_codes: "Code A: ${{result.parallel-a.artifacts}} | Code B: ${{result.parallel-b.artifacts}} | Code C: ${{result.parallel-c.artifacts}}"
      source_description: "PHASE 2: Fan-in from 3 parallel agents"
    task: Validate all 3 codes from parallel agents A, B, and C. Each should be a unique valid hex code.

  # ═══════════════════════════════════════════════════════
  # PHASE 3: Fork (User Choice Branching)
  # ═══════════════════════════════════════════════════════

  - id: choose-path
    type: fork
    question: "Which test path should run? (Pick Path A for deterministic results, or Path B)"
    options: [Path A, Path B]
    branches:
      Path A: path-a-gen
      Path B: path-b-gen
    agent: test-fork-router
    blockedBy: [fanin-validate]

  - id: path-a-gen
    agent: test-code-generator
    task: Generate verification code for fork Path A

  - id: path-b-gen
    agent: test-code-generator
    task: Generate verification code for fork Path B

  - id: fork-validate
    agent: test-code-validator
    blockedBy: [path-a-gen, path-b-gen]
    inputs:
      expected_codes: "Path A code: ${{result.path-a-gen.artifacts}} | Path B code: ${{result.path-b-gen.artifacts}}"
      source_description: "PHASE 3: Fork branching — one path should have a code, the other should be empty (skipped)"
    task: >
      Validate fork behavior. Exactly ONE of the two codes should be a valid hex code.
      The other should be empty (because that branch was skipped).
      Path A artifacts: ${{result.path-a-gen.artifacts}}
      Path B artifacts: ${{result.path-b-gen.artifacts}}
      Report which path was taken and verify the code is valid.

  # ═══════════════════════════════════════════════════════
  # PHASE 4: Conditional Step
  # ═══════════════════════════════════════════════════════

  - id: cond-producer
    agent: test-conditional-producer
    blockedBy: [fork-validate]
    task: Produce artifacts — generate a code and include it in your artifacts field

  - id: cond-check
    type: conditional
    check: cond-producer.artifacts
    present: cond-present-validate
    absent: cond-absent-validate

  - id: cond-present-validate
    agent: test-code-validator
    inputs:
      expected_codes: "Conditional code: ${{result.cond-producer.artifacts}}"
      source_description: "PHASE 4: Conditional — routed to PRESENT branch (artifacts exist)"
    task: Validate the code from the conditional producer. This step runs because artifacts were present.

  - id: cond-absent-validate
    agent: test-code-validator
    inputs:
      expected_codes: "No codes expected"
      source_description: "PHASE 4: Conditional — routed to ABSENT branch (no artifacts). This should NOT run."
    task: This step should NOT run. If you're seeing this, the conditional routing failed. Report FAIL.

  # ═══════════════════════════════════════════════════════
  # PHASE 5: Agent Loop Decision (Verify/Fix Cycle)
  # ═══════════════════════════════════════════════════════

  - id: loop-gen
    agent: test-code-generator
    blockedBy: [cond-present-validate, cond-absent-validate]
    task: Generate a verification code for the loop test

  - id: loop-decision
    type: agent-loop-decision
    agent: test-loop-checker
    task: >
      Check iteration ${{loop.loop-decision.iteration}}/${{loop.loop-decision.max}}.
      Prior step summary: ${{result.loop-gen.summary}}
      If summary contains a valid code (PASS), exit to "loop-final". If not, loop back to "loop-gen".
      branch for loop: loop-gen
      branch for exit: loop-final
    loop_target: loop-gen
    exit_target: loop-final
    max_iterations: 2

  - id: loop-final
    agent: test-code-validator
    inputs:
      expected_codes: "Loop code: ${{result.loop-gen.artifacts}}"
      source_description: "PHASE 5: Agent loop decision — exited loop successfully"
    task: Validate the code that survived the verify/fix loop

  # ═══════════════════════════════════════════════════════
  # PHASE 6: Flow Reference (Sub-flow)
  # ═══════════════════════════════════════════════════════

  - id: run-subflow
    type: flow-ref
    path: .pi/flows/flows/test-subflow.yaml
    blockedBy: [loop-final]
    on_complete: subflow-result-check

  - id: subflow-result-check
    agent: test-code-validator
    inputs:
      expected_codes: "Sub-flow gen code: ${{result.subflow-gen.artifacts}} | Sub-flow validation: ${{result.subflow-validate.summary}}"
      source_description: "PHASE 6: Flow-ref — checking sub-flow results propagated to parent"
    task: Verify that sub-flow results are accessible in the parent flow. The sub-flow generated and validated a code internally.

  # ═══════════════════════════════════════════════════════
  # PHASE 7: Typed Outputs
  # ═══════════════════════════════════════════════════════

  - id: typed-gen
    agent: test-code-generator
    blockedBy: [subflow-result-check]
    task: Generate a code — your typed 'code' output will be tested downstream

  - id: typed-validate
    agent: test-code-validator
    blockedBy: [typed-gen]
    inputs:
      expected_codes: "Typed output code: ${{result.typed-gen.code}} | Artifacts code: ${{result.typed-gen.artifacts}}"
      source_description: "PHASE 7: Typed outputs — comparing result.typed-gen.code vs result.typed-gen.artifacts"
    task: >
      Validate that the typed output 'code' matches the artifacts code.
      Typed output: ${{result.typed-gen.code}}
      Artifacts: ${{result.typed-gen.artifacts}}
      Both should contain the same hex code.

  # ═══════════════════════════════════════════════════════
  # PHASE 8: Final Summary (Fan-In All Results)
  # ═══════════════════════════════════════════════════════

  - id: final-summary
    agent: test-summarizer
    blockedBy: [basic-validate, fanin-validate, fork-validate, cond-present-validate, loop-final, subflow-result-check, typed-validate]
    inputs:
      all_results: |
        PHASE 1 - Basic Agent + Interpolation: ${{result.basic-validate.summary}}
        PHASE 2 - Parallel + Fan-In: ${{result.fanin-validate.summary}}
        PHASE 3 - Fork Branching: ${{result.fork-validate.summary}}
        PHASE 4 - Conditional: ${{result.cond-present-validate.summary}}
        PHASE 5 - Loop Decision: ${{result.loop-final.summary}}
        PHASE 6 - Flow Reference: ${{result.subflow-result-check.summary}}
        PHASE 7 - Typed Outputs: ${{result.typed-validate.summary}}
    task: >
      Produce the final test report. Summarize all 7 test phases and their pass/fail status.
      Count total features tested, how many passed, how many failed.
