name: test-subflow
description: Sub-flow that generates a code and validates it (tests flow-ref feature)

steps:
  - id: subflow-gen
    agent: test-code-generator
    task: Generate a verification code for the sub-flow test

  - id: subflow-validate
    agent: test-code-validator
    blockedBy: [subflow-gen]
    inputs:
      expected_codes: "Sub-flow code: ${{result.subflow-gen.artifacts}}"
      source_description: "Testing flow-ref sub-flow execution"
    task: Validate the code generated by the sub-flow generator step
