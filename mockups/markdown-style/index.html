<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Markdown style mockup — pi-dashboard</title>
<style>
  /* ============================================================
     THEME TOKENS — copied verbatim from packages/client/src/index.css
     ============================================================ */
  :root, [data-theme="dark"] {
    --bg-primary:   #0a0a0a;
    --bg-secondary: #141414;
    --bg-tertiary:  #1e1e1e;
    --bg-surface:   #2a2a2a;
    --bg-code:      #1a1a1a;
    --text-primary:   #e5e5e5;
    --text-secondary: #b0b0b0;
    --text-tertiary:  #808080;
    --border-secondary: #333333;
    --link: #60a5fa;
    --link-hover: #93bbfd;
    --accent: #f59e0b;            /* amber, matches working-pulse */
    --stripe-tint: 255,255,255;   /* light overlay on dark theme */
    --hover-tint: 255,255,255;
  }
  [data-theme="light"] {
    --bg-primary:   #ffffff;
    --bg-secondary: #fafafa;
    --bg-tertiary:  #f0f0f0;
    --bg-surface:   #e0e0e0;
    --bg-code:      #f5f5f5;
    --text-primary:   #1a1a1a;
    --text-secondary: #444444;
    --text-tertiary:  #777777;
    --border-secondary: #cccccc;
    --link: #2563eb;
    --link-hover: #1d4ed8;
    --accent: #d97706;
    --stripe-tint: 0,0,0;         /* dark overlay on light theme */
    --hover-tint: 0,0,0;
  }

  /* ---- tunables, driven by the control panel ---- */
  :root {
    --u-stripe: 0.035;   /* zebra alpha (research: 0.02–0.04) */
    --u-hover:  0.06;     /* row hover alpha */
    --u-lift:   0.22;     /* header shadow strength */
    --u-radius: 8px;      /* table + code corner radius */
    --u-padY:   0.5em;    /* cell vertical padding (density) */
    --u-padX:   0.85em;   /* cell horizontal padding */
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* ===== control panel ===== */
  .panel {
    position: sticky; top: 0; z-index: 50;
    display: flex; flex-wrap: wrap; gap: 18px 26px; align-items: center;
    padding: 12px 20px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-secondary);
    font-size: 13px; color: var(--text-secondary);
    backdrop-filter: blur(8px);
  }
  .panel h1 { font-size: 14px; color: var(--text-primary); margin: 0 12px 0 0; font-weight: 700; }
  .ctl { display: flex; flex-direction: column; gap: 3px; }
  .ctl label { color: var(--text-tertiary); font-size: 11px; letter-spacing: .03em; text-transform: uppercase; }
  .ctl input[type=range] { width: 120px; accent-color: var(--accent); }
  .ctl .val { color: var(--text-primary); font-variant-numeric: tabular-nums; }
  .seg { display: inline-flex; border: 1px solid var(--border-secondary); border-radius: 6px; overflow: hidden; }
  .seg button {
    border: 0; background: transparent; color: var(--text-secondary);
    padding: 6px 12px; cursor: pointer; font-size: 12px;
  }
  .seg button[aria-pressed="true"] { background: var(--bg-surface); color: var(--text-primary); }

  /* ===== layout: two columns (current | proposed) ===== */
  .stage { padding: 28px 24px 80px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; max-width: 2400px; margin: 0 auto; }
  .cols.single { grid-template-columns: 1fr; max-width: 1100px; }
  .col { min-width: 0; }
  .col > .tag {
    display: inline-block; font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--text-tertiary); margin-bottom: 12px; font-weight: 600;
  }
  .surface {
    background: var(--bg-primary);
    border: 1px solid var(--border-secondary);
    border-radius: 12px;
    padding: 24px 26px;
  }

  /* ============================================================
     BASELINE markdown styles (.md-current) — verbatim from index.css
     ============================================================ */
  .md h1 { font-size: 1.5em; font-weight: 700; margin: .5em 0; color: var(--text-primary); }
  .md h2 { font-size: 1.25em; font-weight: 600; margin: .5em 0; color: var(--text-primary); }
  .md p { margin: .55em 0; }
  .md p:first-child { margin-top: 0; }
  .md ul { list-style: disc; padding-left: 1.5em; margin: .5em 0; }
  .md li { margin: .2em 0; }
  .md strong { font-weight: 700; color: var(--text-primary); }
  .md a { color: var(--link); text-decoration: underline; }
  .md hr { border: none; border-top: 1px solid var(--border-secondary); margin: 1em 0; }

  /* ---- CURRENT table ---- */
  .md-current table { border-collapse: collapse; margin: .5em 0; width: 100%; }
  .md-current th, .md-current td {
    border: 1px solid var(--border-secondary); padding: .3em .6em; text-align: left;
  }
  .md-current th { background: var(--bg-tertiary); font-weight: 600; color: var(--text-primary); }
  /* ---- CURRENT inline code ---- */
  .md-current code {
    background: var(--bg-surface); padding: .1em .4em; border-radius: 4px;
    font-size: .88em; font-family: 'SF Mono', Menlo, monospace;
  }
  /* ---- CURRENT code block ---- */
  .md-current pre {
    background: var(--bg-code); border-radius: 6px; padding: 16px; overflow-x: auto; margin: .5em 0;
  }
  .md-current pre code { background: none; padding: 0; font-size: .85em; }

  /* ============================================================
     PROPOSED markdown styles (.md-new)
     ============================================================ */
  /* Table shell: rounded, clipped, one outer hairline, NO inner vertical grid */
  .md-new .tbl-wrap {
    margin: .9em 0;
    border: 1px solid var(--border-secondary);
    border-radius: var(--u-radius);
    overflow: hidden;            /* clip header gradient + zebra to radius */
    overflow-x: auto;
    box-shadow: 0 1px 2px rgba(var(--stripe-tint), .04);
  }
  .md-new table { border-collapse: collapse; width: 100%; font-size: .95em; }

  /* Elevated header: gradient fill, uppercase micro-label, accent underline,
     soft drop shadow so it floats over the body rows */
  .md-new thead th {
    position: sticky; top: 0;
    background:
      linear-gradient(180deg,
        rgba(var(--stripe-tint), .04),
        rgba(var(--stripe-tint), 0)),
      var(--bg-tertiary);
    color: var(--text-primary);
    font-weight: 600;
    font-size: .82em;
    letter-spacing: .04em;
    text-transform: uppercase;
    text-align: left;
    padding: .65em var(--u-padX);
    border-bottom: 2px solid var(--border-secondary);
    box-shadow: 0 2px 6px rgba(var(--stripe-tint), var(--u-lift));
  }
  .md-new tbody td {
    padding: var(--u-padY) var(--u-padX);
    border-top: 1px solid rgba(var(--stripe-tint), .07);  /* hairline row dividers only */
    vertical-align: top;
  }
  .md-new tbody tr:first-child td { border-top: 0; }
  /* Subtle zebra — alpha overlay, theme-agnostic */
  .md-new tbody tr:nth-child(even) { background: rgba(var(--stripe-tint), var(--u-stripe)); }
  /* Row hover for horizontal tracking */
  .md-new tbody tr:hover { background: rgba(var(--hover-tint), var(--u-hover)); }
  /* First column = index: centered, muted, tabular */
  .md-new tbody td:first-child {
    color: var(--text-tertiary); text-align: center; font-variant-numeric: tabular-nums; width: 1%; white-space: nowrap;
  }
  .md-new thead th:first-child { text-align: center; }

  /* Refined inline code: tinted fill + hairline border, tighter */
  .md-new code {
    background: rgba(var(--stripe-tint), .06);
    border: 1px solid rgba(var(--stripe-tint), .09);
    padding: .08em .38em; border-radius: 5px;
    font-size: .85em; font-family: 'SF Mono', Menlo, monospace;
    color: var(--text-primary);
  }

  /* Code block with a window-style header bar + filename + dot */
  .md-new .code-card {
    margin: .9em 0; border: 1px solid var(--border-secondary);
    border-radius: var(--u-radius); overflow: hidden;
    box-shadow: 0 1px 2px rgba(var(--stripe-tint), .05);
  }
  .md-new .code-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border-secondary);
    font-size: 11px; color: var(--text-tertiary); letter-spacing: .03em;
  }
  .md-new .code-bar .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border-secondary); }
  .md-new .code-bar .copy { margin-left: auto; opacity: .6; }
  .md-new pre {
    background: var(--bg-code); padding: 16px; overflow-x: auto; margin: 0;
  }
  .md-new pre code {
    background: none; border: 0; padding: 0; font-size: .85em; color: var(--text-secondary);
    font-family: 'SF Mono', Menlo, monospace;
  }
  .md-new strong, .md-current strong { color: var(--text-primary); }
  .md pre, .md-new pre { white-space: pre; }
</style>
</head>
<body data-theme="light">

<div class="panel">
  <h1>Markdown mockup</h1>

  <div class="seg" id="theme">
    <button data-v="light" aria-pressed="true">Light</button>
    <button data-v="dark"  aria-pressed="false">Dark</button>
  </div>

  <div class="seg" id="view">
    <button data-v="both" aria-pressed="true">Current + Proposed</button>
    <button data-v="new"  aria-pressed="false">Proposed only</button>
  </div>

  <div class="ctl">
    <label>Zebra <span class="val" id="v-stripe"></span></label>
    <input type="range" id="stripe" min="0" max="0.08" step="0.005" value="0.035" />
  </div>
  <div class="ctl">
    <label>Hover <span class="val" id="v-hover"></span></label>
    <input type="range" id="hover" min="0" max="0.14" step="0.01" value="0.06" />
  </div>
  <div class="ctl">
    <label>Header lift <span class="val" id="v-lift"></span></label>
    <input type="range" id="lift" min="0" max="0.5" step="0.02" value="0.22" />
  </div>
  <div class="ctl">
    <label>Radius <span class="val" id="v-radius"></span></label>
    <input type="range" id="radius" min="0" max="16" step="1" value="8" />
  </div>
  <div class="ctl">
    <label>Density <span class="val" id="v-pad"></span></label>
    <input type="range" id="pad" min="0.3" max="0.8" step="0.05" value="0.5" />
  </div>
</div>

<div class="stage">
  <div class="cols" id="cols">
    <!-- ============ CURRENT ============ -->
    <div class="col" id="col-current">
      <span class="tag">Current</span>
      <div class="surface md md-current">
        <div id="content-current"></div>
      </div>
    </div>
    <!-- ============ PROPOSED ============ -->
    <div class="col">
      <span class="tag">Proposed</span>
      <div class="surface md md-new">
        <div id="content-new"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // Sample content mirrors the screenshot the user shared.
  const C = (s) => `<code>${s}</code>`;
  const sampleCurrent = `
    <p>Validates clean. Here's what I captured.</p>
    <p><strong>Created: OpenSpec change</strong> ${C('unify-file-link-openability')}</p>
    <pre><code>openspec/changes/unify-file-link-openability/
├── proposal.md            Why / What / Capabilities / Impact
├── design.md              D1–D6 decisions, risks, non-goals
├── tasks.md               8 sections, ~30 checklist items
└── specs/
    ├── tool-output-linkification/spec.md   +absolute/file:// detection
    └── open-in-editor/spec.md              +OpenFileButton preview fallback</code></pre>
    <p><strong>The three defects it covers</strong> (your "same root" intuition, made precise):</p>
    <table>
      <thead><tr><th>#</th><th>Defect</th><th>Fix locus</th></tr></thead>
      <tbody>
        <tr><td>①</td><td>Absolute &amp; ${C('file://')} paths get their root stripped → re-rooted under cwd → wrong file</td><td>tokenizer grammar + absolute pass-through in resolve</td></tr>
        <tr><td>②</td><td>${C('OpenFileButton')} returns ${C('null')} with no editor → Read/Edit/Write headers un-openable</td><td>add ${C('FilePreviewOverlay')} fallback (DRY shared routing with ${C('FileLink')})</td></tr>
        <tr><td>③</td><td>${C('MarkdownContent')} never linkifies → prose &amp; inline-code paths inert</td><td>post-process inline text/code nodes through the tokenizer</td></tr>
      </tbody>
    </table>
    <p><strong>Key safety note</strong> (D4 / ${C('open-in-editor')} delta): absolute and ${C('file://')} paths must still pass the ${C('/api/file')} containment check — ${C('/etc/passwd')} stays rejected.</p>
    <hr/>
    <p>A few things worth your eye before any implementation:</p>
    <ul>
      <li><strong>D6's open question</strong> — the cleanest react-markdown hook for prose linkification (component-override vs. remark plugin).</li>
      <li>I'm <strong>still in explore mode</strong> — this is captured thinking, not code. To implement, run ${C('openspec-apply-change')}.</li>
    </ul>`;

  // Proposed reuses same markup but wraps tables/code in shell elements.
  const sampleNew = sampleCurrent
    .replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/,
      `<div class="code-card"><div class="code-bar"><span class="dot"></span><span>file tree</span><span class="copy">⧉ copy</span></div><pre><code>$1</code></pre></div>`)
    .replace(/<table>([\s\S]*?)<\/table>/,
      `<div class="tbl-wrap"><table>$1</table></div>`);

  document.getElementById('content-current').innerHTML = sampleCurrent;
  document.getElementById('content-new').innerHTML = sampleNew;

  // ---- controls ----
  const root = document.documentElement;
  const fmt = (n, d=3) => Number(n).toFixed(d);
  function bind(id, varName, suffix='', dec=3) {
    const el = document.getElementById(id);
    const out = document.getElementById('v-' + id);
    const apply = () => {
      root.style.setProperty(varName, el.value + suffix);
      if (out) out.textContent = (suffix === 'px' ? el.value + 'px' : fmt(el.value, dec));
    };
    el.addEventListener('input', apply); apply();
  }
  bind('stripe', '--u-stripe');
  bind('hover',  '--u-hover');
  bind('lift',   '--u-lift');
  bind('radius', '--u-radius', 'px', 0);
  // density: drive both padY/padX from one slider
  const padEl = document.getElementById('pad'), padOut = document.getElementById('v-pad');
  const applyPad = () => {
    root.style.setProperty('--u-padY', padEl.value + 'em');
    root.style.setProperty('--u-padX', (Number(padEl.value) + 0.35).toFixed(2) + 'em');
    padOut.textContent = padEl.value + 'em';
  };
  padEl.addEventListener('input', applyPad); applyPad();

  // theme + view toggles
  function seg(id, fn) {
    const grp = document.getElementById(id);
    grp.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
      grp.querySelectorAll('button').forEach(x => x.setAttribute('aria-pressed', 'false'));
      b.setAttribute('aria-pressed', 'true');
      fn(b.dataset.v);
    }));
  }
  seg('theme', v => document.body.setAttribute('data-theme', v));
  seg('view', v => {
    const cols = document.getElementById('cols');
    const cur = document.getElementById('col-current');
    if (v === 'new') { cols.classList.add('single'); cur.style.display = 'none'; }
    else { cols.classList.remove('single'); cur.style.display = ''; }
  });
</script>
</body>
</html>
