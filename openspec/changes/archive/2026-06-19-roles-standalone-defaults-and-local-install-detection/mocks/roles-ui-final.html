<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Roles UI — final (ported)</title>
<style>
  :root{
    --bg-primary:#0a0a0a;--bg-secondary:#141414;--bg-tertiary:#1e1e1e;--bg-surface:#2a2a2a;
    --bg-hover:rgba(255,255,255,.06);--text-primary:#e5e5e5;--text-secondary:#b0b0b0;
    --text-tertiary:#808080;--text-muted:#585858;--border-primary:#252525;--border-secondary:#333;
    --border-subtle:rgba(255,255,255,.06);--accent-blue:#3b82f6;--accent-green:#22c55e;
    --accent-purple:#a855f7;--accent-orange:#f97316;--accent-red:#ef4444;--accent-warning:#f59e0b;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:40px;background:var(--bg-primary);color:var(--text-primary);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:14px}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
  .wrap{max-width:560px;margin:0 auto}
  .cap{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);margin-bottom:12px}

  /* section = component root: rounded-lg p-4 space-y-3 */
  .section{border:1px solid var(--border-primary);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:12px}

  /* header + progress */
  .head{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .head .l{display:flex;align-items:baseline;gap:8px;min-width:0}
  .head h3{margin:0;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-secondary)}
  .head .gl{font-size:10px;color:var(--text-muted)}
  .prog{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text-tertiary)}
  .meter{width:80px;height:6px;border-radius:999px;background:var(--bg-tertiary);overflow:hidden}
  .meter>span{display:block;height:100%;background:var(--accent-green)}

  /* banner */
  .banner{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-secondary);
    border-radius:8px;padding:8px 12px;
    border:1px solid color-mix(in srgb,var(--accent-warning) 35%,var(--border-secondary));
    background:color-mix(in srgb,var(--accent-warning) 8%,transparent)}
  .banner .d{width:6px;height:6px;border-radius:999px;background:var(--accent-warning);flex:none}

  /* presets */
  .presets{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;border-radius:6px;font-size:11px}
  .chip.active{background:var(--accent-blue);color:#fff}
  .chip.idle{background:var(--bg-tertiary);color:var(--text-secondary)}
  .chip .load{padding:4px 4px 4px 10px;background:none;border:none;color:inherit;cursor:pointer;font-size:11px}
  .chip .del{margin-right:4px;width:16px;height:16px;border-radius:999px;border:none;background:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:11px;line-height:1}
  .chip.active .del{color:rgba(255,255,255,.6)} .chip.active .del:hover{color:#fff;background:rgba(255,255,255,.25)}
  .chip.idle .del{color:var(--text-muted)} .chip.idle .del:hover{color:var(--accent-red);background:var(--bg-hover)}
  .savechip{padding:4px 10px;font-size:11px;border-radius:6px;background:var(--bg-tertiary);color:var(--text-muted);border:none;cursor:pointer}

  /* save/reload */
  .tools{display:flex;align-items:center;gap:8px}
  .btn{font-size:11px;padding:4px 10px;border-radius:6px;border:none;cursor:pointer}
  .btn.save-off{background:var(--bg-tertiary);color:var(--text-muted)}
  .btn.reload{background:var(--bg-tertiary);color:var(--text-secondary)}

  /* role rows */
  .rows{display:flex;flex-direction:column}
  .row{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:8px;width:100%;text-align:left;border:none;background:none;cursor:pointer;color:inherit}
  .row+.row{border-top:1px solid var(--border-subtle)}
  .row:hover{background:var(--bg-hover)}
  .ic{width:28px;height:28px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
  .grow{flex:1;min-width:0}
  .rn{font-size:13px;font-weight:600;color:var(--text-primary)} .rn .at{color:var(--accent-blue)}
  .rd{font-size:11px;color:var(--text-muted)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:4px 8px;border-radius:6px;background:var(--bg-tertiary);border:1px solid var(--border-secondary);color:var(--text-secondary);max-width:45%}
  .pill .d{width:6px;height:6px;border-radius:999px;background:var(--accent-green);flex:none}
  .setbtn{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 10px;border-radius:6px;color:var(--accent-blue);background:none;border:1px dashed color-mix(in srgb,var(--accent-blue) 50%,transparent)}
</style></head>
<body><div class="wrap">
  <div class="cap">Final · Variant A ported into RolesSettingsSection.tsx (preset × fixed)</div>
  <div class="section">

    <div class="head">
      <div class="l"><h3>Roles</h3><span class="gl">global role → model</span></div>
      <div class="prog"><span>3 / 6 configured</span><span class="meter"><span style="width:50%"></span></span></div>
    </div>

    <div class="presets">
      <span class="chip active"><button class="load">Anthropic</button><button class="del">×</button></span>
      <span class="chip idle"><button class="load">Opencode Deepseek</button><button class="del">×</button></span>
      <span class="chip idle"><button class="load">Haiku</button><button class="del">×</button></span>
      <button class="savechip">+ Save current as preset</button>
    </div>

    <div class="tools">
      <button class="btn save-off">Save</button>
      <button class="btn reload">Reload</button>
    </div>

    <div class="rows">
      <button class="row"><span class="ic" style="background:color-mix(in srgb,var(--accent-purple) 18%,transparent);color:var(--accent-purple)">P</span>
        <span class="grow"><span class="rn"><span class="at">@</span>planning</span><br><span class="rd">Deep reasoning, design, multi-step plans</span></span>
        <span class="pill"><span class="d"></span><span class="mono">claude-opus-4-8</span></span></button>
      <button class="row"><span class="ic" style="background:color-mix(in srgb,var(--accent-blue) 18%,transparent);color:var(--accent-blue)">C</span>
        <span class="grow"><span class="rn"><span class="at">@</span>coding</span><br><span class="rd">Implementation, edits, refactors</span></span>
        <span class="pill"><span class="d"></span><span class="mono">claude-opus-4-7</span></span></button>
      <button class="row"><span class="ic" style="background:color-mix(in srgb,var(--accent-green) 18%,transparent);color:var(--accent-green)">K</span>
        <span class="grow"><span class="rn"><span class="at">@</span>compact</span><br><span class="rd">History compaction</span></span>
        <span class="setbtn">+ Set model</span></button>
      <button class="row"><span class="ic" style="background:color-mix(in srgb,var(--accent-orange) 18%,transparent);color:var(--accent-orange)">F</span>
        <span class="grow"><span class="rn"><span class="at">@</span>fast</span><br><span class="rd">Cheap, quick subagents (Explore)</span></span>
        <span class="setbtn">+ Set model</span></button>
      <button class="row"><span class="ic" style="background:color-mix(in srgb,var(--accent-blue) 18%,transparent);color:var(--accent-blue)">V</span>
        <span class="grow"><span class="rn"><span class="at">@</span>vision</span><br><span class="rd">Image / screenshot understanding</span></span>
        <span class="setbtn">+ Set model</span></button>
      <button class="row"><span class="ic" style="background:color-mix(in srgb,var(--accent-purple) 18%,transparent);color:var(--accent-purple)">R</span>
        <span class="grow"><span class="rn"><span class="at">@</span>research</span><br><span class="rd">Web search, synthesis</span></span>
        <span class="pill"><span class="d"></span><span class="mono">claude-sonnet-4-6</span></span></button>
    </div>

  </div>
</div></body></html>
