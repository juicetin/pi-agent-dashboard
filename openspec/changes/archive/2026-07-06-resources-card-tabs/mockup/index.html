<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Resources → Card Tabs mockup</title>
<style>
  :root{
    --bg-primary:#ffffff; --bg-secondary:#fafafa; --bg-tertiary:#f0f0f0;
    --bg-surface:#e0e0e0; --bg-hover:rgba(0,0,0,.04); --bg-selected:#e8e8e8;
    --text-primary:#1a1a1a; --text-secondary:#444; --text-tertiary:#777;
    --text-muted:#aaa; --border-primary:#e0e0e0; --border-secondary:#ccc;
    --accent-primary:#2563eb; --accent-green:#16a34a; --accent-purple:#9333ea;
    --accent-orange:#ea580c; --accent-teal:#0d9488;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg-primary);color:var(--text-primary);font-size:14px}
  .hdr{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border-primary)}
  .hdr .back{color:var(--text-muted);font-size:20px;cursor:pointer}
  .hdr h1{font-size:19px;font-weight:700;margin:0}
  .hdr .cwd{font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--text-muted)}
  .body{display:flex;min-height:calc(100vh - 65px)}
  nav{width:232px;flex-shrink:0;border-right:1px solid var(--border-primary);padding:10px 8px}
  .navgroup{padding:12px 12px 4px;font-size:11px;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;color:var(--text-tertiary)}
  .navitem{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;
    color:var(--text-muted);cursor:pointer;font-size:14px;user-select:none}
  .navitem:hover{background:var(--bg-secondary);color:var(--text-secondary)}
  .navitem.active{background:rgba(37,99,235,.12);color:var(--text-primary);font-weight:600}
  .navitem .ico{width:18px;text-align:center;opacity:.85}
  .navitem .count{margin-left:auto;font-size:11px;color:var(--text-muted);
    background:var(--bg-tertiary);padding:1px 7px;border-radius:10px}
  .navitem.active .count{background:rgba(37,99,235,.16);color:var(--accent-primary)}
  main{flex:1;min-width:0;padding:18px 22px;overflow:auto}
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .toolbar h2{font-size:16px;margin:0;font-weight:700}
  .search{flex:1;max-width:320px;padding:7px 12px;border:1px solid var(--border-secondary);
    border-radius:8px;background:var(--bg-secondary);font-size:13px;color:var(--text-primary)}
  .scopefilter{display:flex;gap:4px;background:var(--bg-tertiary);border-radius:8px;padding:3px}
  .scopefilter button{border:0;background:transparent;padding:5px 12px;border-radius:6px;
    font-size:12px;color:var(--text-tertiary);cursor:pointer}
  .scopefilter button.on{background:var(--bg-primary);color:var(--text-primary);
    font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .refresh{margin-left:auto;color:var(--text-muted);cursor:pointer;font-size:16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(288px,1fr));gap:12px}
  .card{border:1px solid var(--border-primary);border-radius:12px;background:var(--bg-secondary);
    padding:13px 14px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:.12s;position:relative}
  .card:hover{border-color:var(--border-secondary);box-shadow:0 2px 10px rgba(0,0,0,.06);transform:translateY(-1px)}
  .card.off{opacity:.55}
  .card .top{display:flex;align-items:flex-start;gap:8px}
  .card .tico{font-size:15px;line-height:1.2;flex-shrink:0}
  .card .name{font-weight:650;font-size:13.5px;flex:1;min-width:0;word-break:break-word}
  .tog{width:34px;height:19px;border-radius:20px;background:var(--accent-primary);position:relative;flex-shrink:0;cursor:pointer}
  .tog.off{background:var(--bg-surface)}
  .tog::after{content:"";position:absolute;width:14px;height:14px;border-radius:50%;
    background:#fff;top:2.5px;left:17px;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .tog.off::after{left:2.5px}
  .card .desc{font-size:11.5px;color:var(--text-tertiary);line-height:1.45;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .badges{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:2px}
  .badge{font-size:10.5px;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;font-weight:600}
  .b-local{background:rgba(22,163,74,.12);color:var(--accent-green)}
  .b-global{background:rgba(147,51,234,.12);color:var(--accent-purple)}
  .b-loose{background:var(--bg-tertiary);color:var(--text-tertiary)}
  .b-pkg{background:rgba(234,88,12,.11);color:var(--accent-orange)}
  .b-meta{background:rgba(37,99,235,.10);color:var(--accent-primary)}
  .path{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--text-muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* theme swatch strip */
  .swatch{display:flex;height:26px;border-radius:6px;overflow:hidden;border:1px solid var(--border-primary)}
  .swatch span{flex:1}
  .note{margin:22px 0 0;font-size:11px;color:var(--text-muted);border-top:1px dashed var(--border-secondary);padding-top:12px}
  @media(max-width:640px){nav{display:none}}
</style>
</head>
<body>
  <div class="hdr">
    <span class="back">←</span>
    <h1>Directory Settings</h1>
    <span class="cwd">/Users/robson/Project/pi-agent-dashboard</span>
  </div>

  <div class="body">
    <nav id="nav">
      <div class="navgroup">Directory</div>
      <div class="navitem" data-static>📄 Instructions</div>
      <div class="navitem" data-static>📦 Packages</div>
      <div class="navgroup" style="margin-top:8px">Resources</div>
      <div class="navitem active" data-page="skills">📖 Skills <span class="count">33</span></div>
      <div class="navitem" data-page="agents">🤖 Agents <span class="count">6</span></div>
      <div class="navitem" data-page="extensions">🧩 Extensions <span class="count">4</span></div>
      <div class="navitem" data-page="prompts">💬 Prompts <span class="count">2</span></div>
      <div class="navitem" data-page="themes">🎨 Themes <span class="count">3</span></div>
    </nav>

    <main>
      <div class="toolbar">
        <h2 id="pageTitle">Skills</h2>
        <input class="search" id="search" placeholder="Filter…" />
        <div class="scopefilter">
          <button class="on">All</button><button>Local</button><button>Global</button>
        </div>
        <span class="refresh">⟳</span>
      </div>
      <div class="grid" id="grid"></div>
      <p class="note" id="note"></p>
    </main>
  </div>

<script>
const ICON = {skill:"📖",agent:"🤖",extension:"🧩",prompt:"💬",theme:"🎨"};
const DATA = {
  skills:[
    {name:"code-quality",on:true,scope:"local",src:"loose",path:".pi/skills/code-quality/SKILL.md",desc:"Drive static-analysis code quality with Biome (analyze → fix → test). Changed-files daily driver and whole-repo cleanup."},
    {name:"code-review",on:true,scope:"local",src:"loose",path:".pi/skills/code-review/SKILL.md",desc:"AI-powered code review using CodeRabbit. Drives the dev inner loop: review, fix, re-review before commit."},
    {name:"accessibility-a11y",on:true,scope:"global",src:"loose",path:"~/.pi/agent/skills/accessibility-a11y/SKILL.md",desc:"Semantic HTML, keyboard nav, focus states, ARIA labels, WCAG contrast. Ensure accessibility compliance."},
    {name:"frontend-mockup-loop",on:true,scope:"local",src:"pkg:mockup-loop",path:"packages/mockup-loop/.pi/skills/…",desc:"Plan, build, and iterate UX-friendly frontend mockups via a ground→contract→mockup→test→fix→learn loop."},
    {name:"openspec-explore",on:true,scope:"local",src:"pkg:opsx",path:".pi/skills/openspec-explore/SKILL.md",desc:"Enter explore mode — a thinking partner for exploring ideas and clarifying requirements."},
    {name:"security-hardening",on:false,scope:"local",src:"pkg:eng-disciplines",path:"packages/eng-disciplines/…",desc:"Harden code against vulnerabilities. Threat-model untrusted input, auth, secrets, third-party integrations."},
    {name:"nano-banana-imagegen",on:true,scope:"global",src:"loose",path:"~/.pi/agent/skills/nano-banana/SKILL.md",desc:"Generate and edit images using Google Gemini image models via the nano-banana CLI."},
    {name:"faq-mine",on:true,scope:"local",src:"loose",path:".pi/skills/faq-mine/SKILL.md",desc:"Mine docs/faq.md from README + docs. Dispatches haiku subagents per source doc."},
  ],
  agents:[
    {name:"Explore",on:true,scope:"local",src:"loose",path:".pi/agents/Explore.md",model:"@fast",tools:"read-only",desc:"Read-only codebase search, \"where is X\" questions. Default for investigation."},
    {name:"react-expert",on:true,scope:"local",src:"loose",path:".pi/agents/react-expert.md",model:"sonnet",tools:"edit,read",desc:"React component refactors, hooks, state-management, render perf in src/client/ and packages/web/."},
    {name:"typescript-expert",on:true,scope:"local",src:"loose",path:".pi/agents/typescript-expert.md",model:"sonnet",tools:"edit,read",desc:"Type-system work, generics, strict-mode fixes, async/Promise typing, .d.ts authoring."},
    {name:"nodejs-expert",on:true,scope:"local",src:"loose",path:".pi/agents/nodejs-expert.md",model:"sonnet",tools:"edit,read",desc:"Server-side async, streams, perf, Node API usage in src/server/, Electron main process."},
    {name:"tailwind-expert",on:false,scope:"local",src:"loose",path:".pi/agents/tailwind-expert.md",model:"haiku",tools:"edit,read",desc:"Utility-class refactors, responsive breakpoints, design-token audits, dark-mode plumbing."},
    {name:"doc-writer",on:true,scope:"global",src:"loose",path:"~/.pi/agent/agents/doc-writer.md",model:"haiku",tools:"write",desc:"General-purpose caveman-style docs writer for docs/ prose and AGENTS.md tree rows."},
  ],
  extensions:[
    {name:"pi-dashboard-bridge",on:true,scope:"global",src:"pkg:extension",path:"~/.pi/agent/extensions/pi-dashboard/",desc:"Forwards session events to the dashboard server via WebSocket. Runs in every pi session."},
    {name:"pi-dashboard-subagents",on:true,scope:"global",src:"pkg:extension",path:"~/.pi/agent/extensions/pi-dashboard-subagents/",desc:"Forks a compressed parent-context snapshot into every spawned subagent. Configurable maxChars cap."},
    {name:"context-mode",on:true,scope:"global",src:"pkg:npm",path:"~/.pi/agent/npm/…/context-mode/",desc:"Think-in-Code tools: ctx_execute, ctx_search, ctx_batch_execute. PreToolUse hook routes large outputs."},
    {name:"pi-hermes-memory",on:false,scope:"global",src:"loose",path:"~/.pi/agent/pi-hermes-memory/",desc:"Persistent memory stores (failures.md, MEMORY.md, USER.md) surviving across sessions."},
  ],
  prompts:[
    {name:"commit-message",on:true,scope:"local",src:"loose",path:".pi/prompts/commit-message.md",desc:"Generate a Conventional Commits message from the staged diff. Scoped, imperative subject line."},
    {name:"pr-summary",on:true,scope:"global",src:"pkg:opsx",path:"~/.pi/agent/prompts/pr-summary.md",desc:"Summarize a branch's changes into a PR description with What/Why/Testing sections."},
  ],
  themes:[
    {name:"midnight",on:true,scope:"global",src:"loose",path:"~/.pi/agent/themes/midnight.json",colors:["#0a0a0a","#141414","#3b82f6","#e5e5e5"],desc:"Deep-black dark theme. Blue accent, low-glow rims. Default dark preset."},
    {name:"paper",on:true,scope:"global",src:"loose",path:"~/.pi/agent/themes/paper.json",colors:["#ffffff","#fafafa","#2563eb","#1a1a1a"],desc:"High-contrast light theme. Warm-white surfaces, blue accent."},
    {name:"solarized-dusk",on:false,scope:"local",src:"pkg:theme-pack",path:".pi/themes/solarized-dusk.json",colors:["#002b36","#073642","#268bd2","#93a1a1"],desc:"Solarized-derived dusk palette. Teal-blue accent, muted foreground."},
  ],
};

function scopeBadge(c){return c.scope==="local"
  ? '<span class="badge b-local">⬡ local</span>'
  : '<span class="badge b-global">◇ global</span>';}
function srcBadge(c){return c.src==="loose"
  ? '<span class="badge b-loose">loose</span>'
  : '<span class="badge b-pkg">📦 '+c.src.replace("pkg:","")+'</span>';}

function renderCard(type,c){
  let extra="";
  if(type==="agent") extra=`<span class="badge b-meta">◆ ${c.model}</span><span class="badge b-meta">🔧 ${c.tools}</span>`;
  let swatch="";
  if(type==="theme") swatch=`<div class="swatch">${c.colors.map(x=>`<span style="background:${x}"></span>`).join("")}</div>`;
  return `<div class="card ${c.on?'':'off'}">
    <div class="top"><span class="tico">${ICON[type]}</span>
      <span class="name">${c.name}</span><span class="tog ${c.on?'':'off'}"></span></div>
    ${swatch}
    <div class="desc">${c.desc}</div>
    <div class="badges">${scopeBadge(c)}${srcBadge(c)}${extra}</div>
    <div class="path" title="${c.path}">${c.path}</div>
  </div>`;
}

const NOTES={
  skills:"33 SKILL.md files (loose + package-contributed). Badges carry scope + source; toggle = activation.",
  agents:"NEW server-side type — scans .pi/agents/*.md. Extra badges show the agent's model (@fast/sonnet/haiku) and allowed tools.",
  extensions:"pi extensions (bridge, subagents, context-mode). Package-provided ones carry a 📦 badge.",
  prompts:"Reusable prompt templates under .pi/prompts/.",
  themes:"Color-scheme presets. Card shows a live swatch strip (bg / surface / accent / text) instead of a description-only row.",
};
const TITLES={skills:"Skills",agents:"Agents",extensions:"Extensions",prompts:"Prompts",themes:"Themes"};
const TYPEMAP={skills:"skill",agents:"agent",extensions:"extension",prompts:"prompt",themes:"theme"};

function show(page){
  document.querySelectorAll('[data-page]').forEach(n=>n.classList.toggle('active',n.dataset.page===page));
  document.getElementById('pageTitle').textContent=TITLES[page];
  document.getElementById('search').placeholder=`Filter ${DATA[page].length} ${page}…`;
  document.getElementById('grid').innerHTML=DATA[page].map(c=>renderCard(TYPEMAP[page],c)).join('');
  document.getElementById('note').innerHTML="Mockup — mirrors onto global <b>Settings</b> too. "+NOTES[page];
}
document.querySelectorAll('[data-page]').forEach(n=>n.addEventListener('click',()=>show(n.dataset.page)));
show('skills');
</script>
</body>
</html>
