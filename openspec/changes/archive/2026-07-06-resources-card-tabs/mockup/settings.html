<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Global Settings — Resources card variant</title>
<style>
  :root{
    --bg-primary:#ffffff; --bg-secondary:#fafafa; --bg-tertiary:#f0f0f0;
    --bg-surface:#e0e0e0; --bg-hover:rgba(0,0,0,.04);
    --text-primary:#1a1a1a; --text-secondary:#444; --text-tertiary:#777;
    --text-muted:#aaa; --border-primary:#e0e0e0; --border-secondary:#ccc;
    --accent-primary:#2563eb; --accent-green:#16a34a; --accent-purple:#9333ea;
    --accent-orange:#ea580c;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg-primary);color:var(--text-primary);font-size:14px}
  .hdr{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border-primary)}
  .hdr .back{color:var(--text-muted);font-size:20px;cursor:pointer}
  .hdr h1{font-size:19px;font-weight:700;margin:0}
  .hdr .save{margin-left:auto;font-size:13px;color:var(--text-muted)}
  .body{display:flex;min-height:calc(100vh - 65px)}
  nav{width:236px;flex-shrink:0;border-right:1px solid var(--border-primary);padding:10px 8px;overflow:auto}
  .navgroup{padding:12px 12px 4px;font-size:11px;font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;color:var(--text-tertiary)}
  .navitem{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:8px;
    color:var(--text-muted);cursor:pointer;font-size:14px;user-select:none}
  .navitem:hover{background:var(--bg-secondary);color:var(--text-secondary)}
  .navitem.active{background:rgba(37,99,235,.12);color:var(--text-primary);font-weight:600}
  .navitem .count{margin-left:auto;font-size:11px;color:var(--text-muted);
    background:var(--bg-tertiary);padding:1px 7px;border-radius:10px}
  .navitem.active .count{background:rgba(37,99,235,.16);color:var(--accent-primary)}
  main{flex:1;min-width:0;padding:18px 22px;overflow:auto}
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .toolbar h2{font-size:16px;margin:0;font-weight:700}
  .globalpill{font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:20px;
    background:rgba(147,51,234,.12);color:var(--accent-purple)}
  .search{flex:1;max-width:320px;padding:7px 12px;border:1px solid var(--border-secondary);
    border-radius:8px;background:var(--bg-secondary);font-size:13px;color:var(--text-primary)}
  .refresh{margin-left:auto;color:var(--text-muted);cursor:pointer;font-size:16px}
  .subhint{font-size:11.5px;color:var(--text-muted);margin:0 0 16px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(288px,1fr));gap:12px}
  .card{border:1px solid var(--border-primary);border-radius:12px;background:var(--bg-secondary);
    padding:13px 14px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:.12s;position:relative}
  .card:hover{border-color:var(--border-secondary);box-shadow:0 2px 10px rgba(0,0,0,.06);transform:translateY(-1px)}
  .card.off{opacity:.55}
  .card .top{display:flex;align-items:flex-start;gap:8px}
  .card .tico{font-size:15px;flex-shrink:0}
  .card .name{font-weight:650;font-size:13.5px;flex:1;min-width:0;word-break:break-word}
  .tog{width:34px;height:19px;border-radius:20px;background:var(--accent-primary);position:relative;flex-shrink:0;cursor:pointer}
  .tog.off{background:var(--bg-surface)}
  .tog::after{content:"";position:absolute;width:14px;height:14px;border-radius:50%;
    background:#fff;top:2.5px;left:17px;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .tog.off::after{left:2.5px}
  .card .desc{font-size:11.5px;color:var(--text-tertiary);line-height:1.45;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .badges{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:2px}
  .badge{font-size:10.5px;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;font-weight:600}
  .b-loose{background:var(--bg-tertiary);color:var(--text-tertiary)}
  .b-pkg{background:rgba(234,88,12,.11);color:var(--accent-orange)}
  .b-meta{background:rgba(37,99,235,.10);color:var(--accent-primary)}
  .path{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--text-muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .swatch{display:flex;height:26px;border-radius:6px;overflow:hidden;border:1px solid var(--border-primary)}
  .swatch span{flex:1}
  .note{margin:22px 0 0;font-size:11px;color:var(--text-muted);border-top:1px dashed var(--border-secondary);padding-top:12px}
  @media(max-width:640px){nav{display:none}}
</style>
</head>
<body>
  <div class="hdr">
    <span class="back">←</span>
    <h1>Settings</h1>
    <span class="save">All changes saved</span>
  </div>

  <div class="body">
    <nav>
      <div class="navgroup">Dashboard</div>
      <div class="navitem" data-static>⚙️ General</div>
      <div class="navitem" data-static>🖥️ Server</div>
      <div class="navitem" data-static>🗂️ Sessions</div>
      <div class="navgroup">Network</div>
      <div class="navitem" data-static>🌐 Remote Servers</div>
      <div class="navitem" data-static>🔒 Security</div>
      <div class="navgroup">Extensions</div>
      <div class="navitem" data-static>🔑 Providers</div>
      <div class="navitem" data-static>📦 Packages</div>
      <div class="navitem" data-static>🧩 Plugins</div>
      <div class="navitem" data-static>📋 OpenSpec</div>
      <div class="navgroup">Resources</div>
      <div class="navitem active" data-page="skills">📖 Skills <span class="count">28</span></div>
      <div class="navitem" data-page="agents">🤖 Agents <span class="count">4</span></div>
      <div class="navitem" data-page="extensions">🔌 Extensions <span class="count">5</span></div>
      <div class="navitem" data-page="prompts">💬 Prompts <span class="count">3</span></div>
      <div class="navitem" data-page="themes">🎨 Themes <span class="count">6</span></div>
      <div class="navgroup">Advanced</div>
      <div class="navitem" data-static>🔧 Developer</div>
      <div class="navitem" data-static>📄 Instructions</div>
    </nav>

    <main>
      <div class="toolbar">
        <h2 id="pageTitle">Skills</h2>
        <span class="globalpill">◇ global</span>
        <input class="search" id="search" placeholder="Filter…" />
        <span class="refresh">⟳</span>
      </div>
      <p class="subhint" id="subhint"></p>
      <div class="grid" id="grid"></div>
      <p class="note" id="note"></p>
    </main>
  </div>

<script>
const ICON={skill:"📖",agent:"🤖",extension:"🔌",prompt:"💬",theme:"🎨"};
// Global surface: every row is global scope. Source badge (loose vs 📦 pkg) still varies.
const DATA={
  skills:[
    {name:"accessibility-a11y",on:true,src:"loose",path:"~/.pi/agent/skills/accessibility-a11y/SKILL.md",desc:"Semantic HTML, keyboard nav, focus states, ARIA labels, WCAG contrast."},
    {name:"nano-banana-imagegen",on:true,src:"loose",path:"~/.pi/agent/skills/nano-banana/SKILL.md",desc:"Generate and edit images using Google Gemini image models via the nano-banana CLI."},
    {name:"find-skills",on:true,src:"loose",path:"~/.agents/skills/find-skills/SKILL.md",desc:"Discover and install agent skills when the user asks \"is there a skill for X\"."},
    {name:"context-mode",on:true,src:"pkg:context-mode",path:"~/.pi/agent/npm/…/skills/context-mode/",desc:"Think-in-Code: process large outputs in a sandbox, only print summaries to context."},
    {name:"consolidate-pi-memory-store",on:false,src:"pkg:pi-hermes-memory",path:"~/.pi/agent/pi-hermes-memory/skills/…",desc:"Safely consolidate/prune the pi-hermes-memory stores without destroying entries."},
    {name:"veo-showreel-production-kit",on:true,src:"pkg:pi-hermes-memory",path:"~/.pi/agent/pi-hermes-memory/skills/…",desc:"Turn a video timeline + voiceover into a reproducible Veo 3.1 prompt package."},
  ],
  agents:[
    {name:"doc-writer",on:true,src:"loose",path:"~/.pi/agent/agents/doc-writer.md",model:"haiku",tools:"write",desc:"General-purpose caveman-style docs writer for docs/ prose and AGENTS.md tree rows."},
    {name:"general-purpose",on:true,src:"loose",path:"~/.pi/agent/agents/general-purpose.md",model:"sonnet",tools:"all",desc:"Default multi-step worker used for open-ended delegated tasks."},
    {name:"research",on:true,src:"pkg:opsx",path:"~/.pi/agent/agents/research.md",model:"@fast",tools:"read-only",desc:"Read-only web + codebase research; returns a synthesized brief."},
    {name:"summarizer",on:false,src:"pkg:pi-hermes-memory",path:"~/.pi/agent/pi-hermes-memory/agents/…",model:"haiku",tools:"read-only",desc:"Condense long documents into structured summaries for fan-out synthesis."},
  ],
  extensions:[
    {name:"pi-dashboard-bridge",on:true,src:"pkg:extension",path:"~/.pi/agent/extensions/pi-dashboard/",desc:"Forwards session events to the dashboard server via WebSocket. Runs in every session."},
    {name:"pi-dashboard-subagents",on:true,src:"pkg:extension",path:"~/.pi/agent/extensions/pi-dashboard-subagents/",desc:"Forks a compressed parent-context snapshot into every spawned subagent."},
    {name:"context-mode",on:true,src:"pkg:npm",path:"~/.pi/agent/npm/…/context-mode/",desc:"PreToolUse hook routes large tool outputs through a sandbox instead of context."},
    {name:"pi-hermes-memory",on:false,src:"loose",path:"~/.pi/agent/pi-hermes-memory/",desc:"Persistent memory stores surviving across sessions (failures.md, MEMORY.md, USER.md)."},
    {name:"projects-memory",on:true,src:"loose",path:"~/.pi/agent/projects-memory/",desc:"Per-project memory + skills, keyed by repo name."},
  ],
  prompts:[
    {name:"pr-summary",on:true,src:"pkg:opsx",path:"~/.pi/agent/prompts/pr-summary.md",desc:"Summarize a branch's changes into a PR description with What/Why/Testing sections."},
    {name:"standup",on:true,src:"loose",path:"~/.pi/agent/prompts/standup.md",desc:"Draft a daily standup from recent commits + session activity."},
    {name:"explain-error",on:false,src:"loose",path:"~/.pi/agent/prompts/explain-error.md",desc:"Explain a stack trace in plain language and propose the top 3 fixes."},
  ],
  themes:[
    {name:"midnight",on:true,src:"loose",path:"~/.pi/agent/themes/midnight.json",colors:["#0a0a0a","#141414","#3b82f6","#e5e5e5"],desc:"Deep-black dark theme. Blue accent, low-glow rims. Default dark preset."},
    {name:"paper",on:true,src:"loose",path:"~/.pi/agent/themes/paper.json",colors:["#ffffff","#fafafa","#2563eb","#1a1a1a"],desc:"High-contrast light theme. Warm-white surfaces, blue accent."},
    {name:"solarized-dusk",on:false,src:"pkg:theme-pack",path:"~/.pi/agent/themes/solarized-dusk.json",colors:["#002b36","#073642","#268bd2","#93a1a1"],desc:"Solarized-derived dusk palette. Teal-blue accent, muted foreground."},
    {name:"nord",on:false,src:"pkg:theme-pack",path:"~/.pi/agent/themes/nord.json",colors:["#2e3440","#3b4252","#88c0d0","#eceff4"],desc:"Cool arctic palette. Frost-blue accent, slate surfaces."},
  ],
};
function srcBadge(c){return c.src==="loose"
  ? '<span class="badge b-loose">loose</span>'
  : '<span class="badge b-pkg">📦 '+c.src.replace("pkg:","")+'</span>';}
function renderCard(type,c){
  let extra="";
  if(type==="agent") extra=`<span class="badge b-meta">◆ ${c.model}</span><span class="badge b-meta">🔧 ${c.tools}</span>`;
  let swatch=type==="theme"?`<div class="swatch">${c.colors.map(x=>`<span style="background:${x}"></span>`).join("")}</div>`:"";
  return `<div class="card ${c.on?'':'off'}">
    <div class="top"><span class="tico">${ICON[type]}</span>
      <span class="name">${c.name}</span><span class="tog ${c.on?'':'off'}"></span></div>
    ${swatch}<div class="desc">${c.desc}</div>
    <div class="badges">${srcBadge(c)}${extra}</div>
    <div class="path" title="${c.path}">${c.path}</div>
  </div>`;
}
const TITLES={skills:"Skills",agents:"Agents",extensions:"Extensions",prompts:"Prompts",themes:"Themes"};
const TYPEMAP={skills:"skill",agents:"agent",extensions:"extension",prompts:"prompt",themes:"theme"};
const HINTS={
  skills:"Skills available to every session (~/.pi/agent + ~/.agents). Global scope — no local/global filter here.",
  agents:"Subagents scanned from ~/.pi/agent/agents/*.md. Model + tools badges from frontmatter.",
  extensions:"pi extensions active across all sessions.",
  prompts:"Prompt templates available globally.",
  themes:"Color-scheme presets. Card shows the palette swatch.",
};
function show(page){
  document.querySelectorAll('[data-page]').forEach(n=>n.classList.toggle('active',n.dataset.page===page));
  document.getElementById('pageTitle').textContent=TITLES[page];
  document.getElementById('search').placeholder=`Filter ${DATA[page].length} ${page}…`;
  document.getElementById('subhint').textContent=HINTS[page];
  document.getElementById('grid').innerHTML=DATA[page].map(c=>renderCard(TYPEMAP[page],c)).join('');
  document.getElementById('note').innerHTML="Mockup — <b>global Settings</b> variant. Same card component as Directory Settings; scope filter dropped (everything here is global), cwd removed, nav grouped into Dashboard / Network / Extensions / <b>Resources</b> / Advanced.";
}
document.querySelectorAll('[data-page]').forEach(n=>n.addEventListener('click',()=>show(n.dataset.page)));
show('skills');
</script>
</body>
</html>
