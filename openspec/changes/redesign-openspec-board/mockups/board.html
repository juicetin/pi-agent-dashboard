<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenSpec Board — mockup</title>
<style>
  :root {
    --bg-primary:#0a0a0a; --bg-secondary:#141414; --bg-tertiary:#1e1e1e;
    --text-primary:#e5e5e5; --text-secondary:#b0b0b0; --text-tertiary:#808080; --text-muted:#585858;
    --border-primary:#252525; --border-secondary:#333333; --border-subtle:#222;
    --shadow-card:rgba(0,0,0,0.4);
    --blue:#3b82f6; --green:#22c55e; --amber:#eab308; --purple:#a855f7; --cyan:#06b6d4; --red:#ef4444; --orange:#fb923c;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--bg-primary); color:var(--text-secondary);
    font:13px/1.4 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  /* ---- top bar ---- */
  .topbar {
    display:flex; align-items:center; gap:12px;
    padding:10px 16px; background:var(--bg-secondary);
    border-bottom:1px solid var(--border-primary); position:sticky; top:0; z-index:10;
  }
  .back { color:var(--blue); cursor:pointer; font-size:13px; background:none; border:none; }
  .crumb { color:var(--text-primary); font-weight:600; }
  .crumb .dim { color:var(--text-tertiary); font-weight:400; }
  .spacer { flex:1; }
  .btn {
    font-size:11px; padding:4px 10px; border-radius:6px; cursor:pointer;
    background:transparent; border:1px solid var(--border-secondary); color:var(--text-secondary);
  }
  .btn:hover { border-color:#555; color:var(--text-primary); }
  .btn.primary { color:var(--blue); border-color:rgba(59,130,246,.4); background:rgba(59,130,246,.06); }
  .btn.purple { color:var(--purple); border-color:rgba(168,85,247,.4); background:rgba(168,85,247,.06); }
  .btn.cyan { color:var(--cyan); border-color:rgba(6,182,212,.4); background:rgba(6,182,212,.06); }

  /* ---- board ---- */
  .board {
    display:flex; gap:12px; padding:16px; align-items:flex-start;
    overflow-x:auto; height:calc(100% - 49px);
  }
  .column {
    flex:0 0 300px; max-width:300px; background:var(--bg-secondary);
    border:1px solid var(--border-primary); border-radius:12px;
    display:flex; flex-direction:column; max-height:100%;
  }
  .column.dragging { opacity:.5; }
  .column.dropzone { outline:2px dashed var(--blue); outline-offset:-2px; }
  .col-head {
    display:flex; align-items:center; gap:8px; padding:10px 12px;
    border-bottom:1px solid var(--border-primary); cursor:grab;
  }
  .col-head .dot { width:10px; height:10px; border-radius:3px; flex:0 0 auto; }
  .col-head .name { font-weight:600; color:var(--text-primary); font-size:12px; }
  .col-head .count { color:var(--text-muted); font-size:11px; }
  .col-head .grip { margin-left:auto; color:var(--text-muted); cursor:grab; font-size:14px; }
  .col-body { padding:8px; display:flex; flex-direction:column; gap:8px; overflow-y:auto; }
  .col-body.empty { color:var(--text-muted); font-size:11px; padding:14px 10px; text-align:center; }

  /* ---- proposal card ---- */
  .card {
    background:var(--bg-tertiary); border:1px solid var(--border-subtle);
    border-radius:10px; padding:8px 10px; cursor:grab;
    box-shadow:0 1px 3px var(--shadow-card);
  }
  .card:hover { border-color:#3a3a3a; }
  .card.dragging { opacity:.4; }
  .card-top { display:flex; align-items:center; gap:6px; }
  .card-name { color:var(--text-primary); font-weight:600; font-size:12px; flex:1; min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pill {
    font-size:9px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
    padding:1px 6px; border-radius:999px; flex:0 0 auto;
  }
  .pill.planning   { color:var(--text-tertiary); background:#2a2a2a; }
  .pill.ready      { color:var(--cyan);   background:rgba(6,182,212,.12); }
  .pill.implementing { color:var(--amber);background:rgba(234,179,8,.12); }
  .pill.complete   { color:var(--green);  background:rgba(34,197,94,.12); }

  /* task progress */
  .progress { margin-top:6px; }
  .progress .bar { height:4px; border-radius:3px; background:#2a2a2a; overflow:hidden; }
  .progress .bar > i { display:block; height:100%; background:var(--green); }
  .progress .label { font-size:9px; color:var(--text-tertiary); margin-top:2px; }

  /* worktree badge */
  .worktree {
    display:inline-flex; align-items:center; gap:4px; margin-top:6px;
    font-size:9px; color:var(--amber); background:rgba(234,179,8,.08);
    border:1px solid rgba(234,179,8,.25); border-radius:6px; padding:1px 6px;
  }
  .worktree .base { color:var(--text-muted); }

  /* sessions inside card */
  .sessions { margin-top:7px; display:flex; flex-direction:column; gap:4px; }
  .sess {
    display:flex; flex-direction:column; gap:2px; background:var(--bg-secondary);
    border:1px solid var(--border-subtle); border-radius:7px; padding:4px 6px; cursor:pointer;
  }
  .srow { display:flex; align-items:center; gap:6px; min-width:0; }
  .sess:hover { border-color:var(--blue); }
  .sess.selected { border-color:rgba(59,130,246,.6); }
  .sess .sdot { width:8px; height:8px; border-radius:999px; flex:0 0 auto; }
  .sess .sname { color:var(--blue); font-size:10px; flex:1 1 auto; min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sess .stats { display:flex; gap:6px; font-size:9px; color:var(--text-tertiary); flex:0 0 auto; white-space:nowrap; }
  .sess .verb { font-size:9px; flex:0 0 auto; white-space:nowrap; }
  .sess .age { font-size:9px; color:var(--text-muted); flex:0 0 auto; margin-left:auto; white-space:nowrap; }
  .card.drop-before { box-shadow:inset 0 2px 0 var(--blue); }
  .card.drop-after  { box-shadow:inset 0 -2px 0 var(--blue); }
  .sess .ctx { width:26px; height:4px; border-radius:3px; background:#2a2a2a; overflow:hidden; }
  .sess .ctx > i { display:block; height:100%; background:var(--blue); }
  .sess .wt { color:var(--amber); font-size:9px; flex:1 1 auto; min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  /* worktree's OWN task state (may differ from proposal/main) — amber bar */
  .wtbar { width:30px; height:4px; border-radius:3px; background:#2a2a2a; overflow:hidden; flex:0 0 auto; }
  .wtbar > i { display:block; height:100%; background:var(--amber); }
  .wtcount { font-size:8px; color:var(--text-muted); flex:0 0 auto; white-space:nowrap; }
  .wtdelta { font-size:8px; font-weight:700; flex:0 0 auto; white-space:nowrap; }
  .wtdelta.ahead  { color:var(--green); }
  .wtdelta.behind { color:var(--orange); }
  .pulse { animation:pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  .legend { padding:0 16px 12px; color:var(--text-muted); font-size:11px; }
  .add-card { color:var(--text-muted); font-size:11px; text-align:center; padding:5px; cursor:pointer; border:1px dashed var(--border-secondary); border-radius:8px; }
  .add-card:hover { color:var(--blue); border-color:var(--blue); }
  /* per-column manage gear */
  .col-head .gear { color:var(--text-muted); cursor:pointer; font-size:12px; }
  .col-head .gear:hover { color:var(--blue); }
  /* add-group ghost column */
  .addgroup {
    flex:0 0 200px; max-width:200px; align-self:flex-start;
    border:1px dashed var(--border-secondary); border-radius:12px;
    color:var(--text-muted); font-size:12px; text-align:center; padding:14px; cursor:pointer;
  }
  .addgroup:hover { color:var(--blue); border-color:var(--blue); }
  /* card action footer */
  .card-actions { display:flex; gap:6px; margin-top:8px; padding-top:7px; border-top:1px solid var(--border-subtle); }
  .card-actions button {
    flex:1; font-size:9px; padding:3px 4px; border-radius:6px; cursor:pointer; background:transparent;
    white-space:nowrap;
  }
  .act-session { color:var(--green); border:1px solid rgba(34,197,94,.3); }
  .act-session:hover { background:rgba(34,197,94,.08); }
  .act-worktree { color:var(--amber); border:1px solid rgba(234,179,8,.3); }
  .act-worktree:hover { background:rgba(234,179,8,.08); }
  /* OpenSpec lifecycle stepper (Explore→Proposal→Design→Specs→Tasks→Apply→Archive) */
  .stepper { display:flex; align-items:flex-start; width:100%; margin-top:9px; }
  .snode { flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; gap:3px; position:relative; cursor:pointer; }
  .snode .line { position:absolute; left:-50%; right:50%; top:9px; height:2px; background:var(--border-secondary); z-index:0; }
  .snode .circle {
    width:20px; height:20px; border-radius:999px; border:2px solid var(--border-secondary);
    display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700;
    color:var(--text-muted); background:var(--bg-tertiary); position:relative; z-index:2;
    transition:transform .12s;
  }
  .snode:hover .circle { transform:scale(1.12); }
  .snode .lbl { font-size:7px; text-transform:uppercase; letter-spacing:.02em; color:var(--text-tertiary);
    text-align:center; line-height:1; white-space:nowrap; }
  .snode .sub { font-size:7px; color:var(--text-muted); line-height:1; }
  /* tint layered as background-image over the OPAQUE base so the connecting
     line (z-index 0) can't bleed through the circle (z-index 2). */
  .snode.done .circle    { border-color:var(--green);  color:var(--green);
    background-image:linear-gradient(rgba(34,197,94,.16), rgba(34,197,94,.16)); }
  .snode.done .lbl       { color:var(--green); }
  .snode.current .circle { border-color:var(--orange); color:var(--orange);
    background-image:linear-gradient(rgba(251,146,60,.18), rgba(251,146,60,.18));
    box-shadow:0 0 0 3px rgba(251,146,60,.15); }
  .snode.current .lbl    { color:var(--orange); font-weight:600; }
  .snode.disabled { opacity:.4; cursor:default; }
  .snode.line-active .line { background:var(--green); }
  /* per-session openspec phase chip (the session's OpenSpec slot) */
  .sphase { font-size:8px; font-weight:700; letter-spacing:.03em; text-transform:uppercase;
    padding:0 4px; border-radius:999px; flex:0 0 auto; white-space:nowrap; }
  .sphase.planning   { color:var(--text-tertiary); background:#2a2a2a; }
  .sphase.designing  { color:var(--purple); background:rgba(168,85,247,.14); }
  .sphase.implementing { color:var(--amber); background:rgba(234,179,8,.14); }
  .sphase.done       { color:var(--green); background:rgba(34,197,94,.14); }
  /* ---- filter bar ---- */
  .filterbar { display:flex; align-items:center; gap:10px; padding:8px 16px; flex-wrap:wrap;
    background:var(--bg-secondary); border-bottom:1px solid var(--border-primary); }
  .filterbar input { background:var(--bg-tertiary); border:1px solid var(--border-secondary); border-radius:7px;
    color:var(--text-primary); font-size:12px; padding:5px 9px; width:230px; outline:none; }
  .filterbar input:focus { border-color:rgba(59,130,246,.5); }
  .flabel { font-size:9px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; }
  .fsep { width:1px; height:18px; background:var(--border-secondary); }
  .fpills { display:flex; gap:4px; }
  .fpill { font-size:10px; padding:3px 9px; border-radius:999px; border:1px solid var(--border-secondary);
    color:var(--text-tertiary); cursor:pointer; background:transparent; }
  .fpill:hover { color:var(--text-secondary); }
  .fpill.active { color:var(--blue); border-color:rgba(59,130,246,.5); background:rgba(59,130,246,.08); }
  /* ---- per-session action group (resume / fork / hide / openspec commands) ---- */
  .sact { display:flex; gap:3px; flex:0 0 auto; align-items:center; }
  .sact button { background:transparent; border:0; cursor:pointer; color:var(--text-muted);
    font-size:11px; line-height:1; padding:0 1px; }
  .sact .resume:hover { color:var(--green); }
  .sact .fork:hover { color:var(--blue); }
  .sact .hide:hover { color:var(--text-secondary); }
  .sact .os:hover { color:var(--purple); }
  /* openspec command menu (anchored) */
  .osmenu { position:fixed; z-index:50; background:var(--bg-primary); border:1px solid var(--border-primary);
    border-radius:8px; padding:4px; min-width:140px; box-shadow:0 6px 24px rgba(0,0,0,.5); }
  .osmenu button { display:flex; align-items:center; gap:7px; width:100%; text-align:left; background:transparent;
    border:0; color:var(--text-secondary); font-size:11px; padding:5px 8px; border-radius:5px; cursor:pointer; }
  .osmenu button:hover { background:var(--bg-tertiary); color:var(--text-primary); }
  .osmenu .g { color:var(--text-muted); width:14px; text-align:center; }
  /* per-column new-proposal + */
  .col-head .plus { color:var(--text-muted); cursor:pointer; font-size:13px; font-weight:700; }
  .col-head .plus:hover { color:var(--green); }
  /* ---- new-proposal dialog ---- */
  .backdrop { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:60; }
  .modal { background:var(--bg-primary); border:1px solid var(--border-primary); border-radius:12px; padding:16px; width:330px; }
  .modal h3 { margin:0 0 4px; font-size:14px; color:var(--text-primary); }
  .modal .hint { font-size:10px; color:var(--text-muted); margin:0 0 12px; }
  .field { margin-bottom:10px; }
  .field > label { display:block; font-size:9px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); margin-bottom:4px; }
  .field input[type=text], .field select { width:100%; background:var(--bg-tertiary); border:1px solid var(--border-secondary);
    border-radius:7px; color:var(--text-primary); font-size:12px; padding:6px 8px; outline:none; }
  .field input:focus, .field select:focus { border-color:rgba(59,130,246,.5); }
  .field.check { display:flex; align-items:center; gap:8px; }
  .field.check label { font-size:12px; color:var(--text-secondary); }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }

  /* ---- responsive: wrap columns to multiple rows on tablet, stack on phone ---- */
  @media (max-width: 900px) {
    body { height:auto; }
    .board { flex-wrap:wrap; overflow-x:visible; height:auto; }
    .column { flex:1 1 300px; max-width:none; max-height:none; }
    .col-body { overflow-y:visible; }
    .addgroup { flex:1 1 100%; max-width:none; }
  }
  @media (max-width: 540px) {
    .topbar { flex-wrap:wrap; row-gap:8px; }
    .topbar .crumb .dim { display:none; }
    .filterbar input { width:100%; }
    .board { padding:10px; gap:10px; }
    .column { flex:1 1 100%; }
    .modal { width:92vw; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <button class="back">← Back</button>
    <span class="crumb">OpenSpec <span class="dim">· pi-agent-dashboard · 66 changes</span></span>
    <span class="spacer"></span>
    <button class="btn">⟳ Refresh</button>
    <button class="btn cyan">Specs</button>
    <button class="btn purple">Archive</button>
    <button class="btn primary" onclick="openProposalDialog(null)">+ New proposal</button>
  </div>

  <div class="filterbar">
    <input id="q" type="text" placeholder="Filter proposals & sessions…" />
    <span class="fsep"></span>
    <span class="flabel">State</span>
    <div class="fpills" id="statePills"></div>
    <span class="fsep"></span>
    <span class="flabel">Session</span>
    <div class="fpills" id="sessPills"></div>
  </div>

  <div class="board" id="board"></div>
  <div class="legend">Drag column headers to reorder groups (persisted). Drag proposal cards between columns to reassign group. Click a session row to open its chat view.</div>
  <div id="menuRoot"></div>

<script>
const STATE = {
  groups: [
    { id:"g1", name:"In flight", color:"#eab308" },
    { id:"g2", name:"Ready to build", color:"#06b6d4" },
    { id:"g3", name:"Backlog", color:"#a855f7" },
    { id:"ungrouped", name:"Ungrouped", color:"#585858" },
  ],
  cards: [
    { id:"c1", group:"g1", order:0, name:"redesign-openspec-board", state:"implementing", done:6, total:14,
      steps:{ explore:"done", proposal:"done", design:"done", specs:"done", tasks:"current", apply:"todo", archive:"todo" },
      sessions:[
        { name:"Redesign openspec", color:"var(--amber)", live:true, verb:"Thinking…", age:"2m", phase:"implementing", sdone:9, stotal:14, tin:"48k", tout:"12k", cost:"0.41", ctx:62, worktree:"os/redesign-board", base:"main", wtDone:9, wtTotal:14 },
        { name:"mockup-pass", color:"var(--green)", verb:"Waiting", age:"14m", phase:"designing", tin:"9k", tout:"3k", cost:"0.08", ctx:18 },
      ]},
    { id:"c2", group:"g1", order:1, name:"add-session-stats-to-cards", state:"implementing", done:3, total:9,
      steps:{ explore:"done", proposal:"done", design:"current", specs:"todo", tasks:"todo", apply:"todo", archive:"todo" },
      sessions:[ { name:"stats-impl", color:"var(--green)", verb:"Waiting", age:"34m", phase:"implementing", sdone:3, stotal:9, tin:"21k", tout:"7k", cost:"0.19", ctx:34 } ]},
    { id:"c3", group:"g2", order:0, name:"worktree-badge-visualization", state:"ready", done:0, total:7,
      steps:{ explore:"done", proposal:"done", design:"done", specs:"done", tasks:"todo", apply:"current", archive:"todo" },
      sessions:[]},
    { id:"c4", group:"g2", order:1, name:"folder-section-route", state:"ready", done:0, total:5,
      steps:{ explore:"done", proposal:"done", design:"done", specs:"current", tasks:"todo", apply:"todo", archive:"todo" },
      sessions:[ { name:"route-spike", color:"var(--text-tertiary)", verb:"Ended", age:"1h", phase:"implementing", sdone:2, stotal:5, tin:"4k", tout:"1k", cost:"0.03", ctx:9, worktree:"os/folder-route", base:"main", wtDone:2, wtTotal:5 } ]},
    { id:"c5", group:"g3", order:0, name:"kanban-keyboard-a11y", state:"planning", done:0, total:0,
      steps:{ explore:"done", proposal:"current", design:"todo", specs:"todo", tasks:"todo", apply:"todo", archive:"todo" }, sessions:[]},
    { id:"c6", group:"ungrouped", order:0, name:"fix-stale-group-order", state:"complete", done:4, total:4,
      steps:{ explore:"done", proposal:"done", design:"done", specs:"done", tasks:"done", apply:"done", archive:"current" },
      sessions:[ { name:"hotfix", color:"var(--green)", verb:"Ended", age:"3h", phase:"done", tin:"6k", tout:"2k", cost:"0.05", ctx:12 } ]},
  ],
};

const board = document.getElementById("board");
let dragCard = null, dragCol = null;

// ---- filtering ----
const FILTER = { q:"", state:null, sess:null };
function sessStatus(s) { return s.live ? "live" : (s.verb==="Ended" ? "ended" : "waiting"); }
function matchSess(s) {
  if (FILTER.sess && sessStatus(s) !== FILTER.sess) return false;
  if (FILTER.q && !(s.name||"").toLowerCase().includes(FILTER.q)) return false;
  return true;
}
function visibleSessions(c) { return c.sessions.filter(matchSess); }
function cardVisible(c) {
  const q = FILTER.q;
  const nameHit = !q || c.name.toLowerCase().includes(q) || c.sessions.some(s=>(s.name||"").toLowerCase().includes(q));
  if (!nameHit) return false;
  if (FILTER.state && c.state !== FILTER.state) return false;
  if (FILTER.sess && !c.sessions.some(s=>sessStatus(s)===FILTER.sess)) return false;
  return true;
}
function initFilters() {
  const STATES = ["planning","ready","implementing","complete"];
  const SESS = [["live","Live"],["waiting","Waiting"],["ended","Ended"]];
  const sp = document.getElementById("statePills");
  sp.innerHTML = `<button class="fpill active" data-v="">All</button>` + STATES.map(s=>`<button class="fpill" data-v="${s}">${s}</button>`).join("");
  const ssp = document.getElementById("sessPills");
  ssp.innerHTML = `<button class="fpill active" data-v="">Any</button>` + SESS.map(([v,l])=>`<button class="fpill" data-v="${v}">${l}</button>`).join("");
  sp.addEventListener("click", e=>{ const b=e.target.closest(".fpill"); if(!b)return; FILTER.state=b.dataset.v||null; sp.querySelectorAll(".fpill").forEach(x=>x.classList.toggle("active",x===b)); render(); });
  ssp.addEventListener("click", e=>{ const b=e.target.closest(".fpill"); if(!b)return; FILTER.sess=b.dataset.v||null; ssp.querySelectorAll(".fpill").forEach(x=>x.classList.toggle("active",x===b)); render(); });
  document.getElementById("q").addEventListener("input", e=>{ FILTER.q=e.target.value.trim().toLowerCase(); render(); });
}

// ---- new-proposal dialog ----
function closeDialog() { const b=document.getElementById("backdrop"); if(b) b.remove(); }
function openProposalDialog(groupId) {
  closeDialog();
  const opts = STATE.groups.map(g=>`<option value="${g.id}" ${g.id===groupId?"selected":""}>${g.name}</option>`).join("");
  const wrap = document.createElement("div"); wrap.className="backdrop"; wrap.id="backdrop";
  wrap.innerHTML = `<div class="modal">
    <h3>New proposal</h3>
    <p class="hint">Spawns a session running the new-change flow. The created change lands in the chosen group.</p>
    <div class="field"><label>Name</label><input id="npName" type="text" placeholder="kebab-case-name" autofocus></div>
    <div class="field"><label>Group</label><select id="npGroup">${opts}</select></div>
    <div class="field check"><input id="npWt" type="checkbox"><label for="npWt">Create in a new worktree (os/&lt;name&gt;)</label></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeDialog()">Cancel</button>
      <button class="btn primary" onclick="createProposal()">Create &amp; spawn</button>
    </div>
  </div>`;
  wrap.addEventListener("click", e=>{ if(e.target===wrap) closeDialog(); });
  document.getElementById("menuRoot").appendChild(wrap);
  setTimeout(()=>document.getElementById("npName")?.focus(), 0);
}
function createProposal() {
  const name = (document.getElementById("npName").value||"").trim() || "untitled-change";
  const group = document.getElementById("npGroup").value;
  const wt = document.getElementById("npWt").checked;
  const order = STATE.cards.filter(c=>c.group===group).length;
  STATE.cards.push({
    id:"n"+Date.now(), group, order, name, state:"planning", done:0, total:0,
    steps:{ explore:"done", proposal:"current", design:"todo", specs:"todo", tasks:"todo", apply:"todo", archive:"todo" },
    sessions:[{ name:"(spawning)", color:"var(--text-tertiary)", verb:"Spawning…", age:"now", phase:"planning",
      tin:"0", tout:"0", cost:"0.00", ctx:0, ...(wt?{ worktree:"os/"+name, base:"main" }:{}) }],
  });
  closeDialog(); render();
}

// ---- per-session openspec command menu ----
function closeOsMenu() { const m=document.getElementById("osmenu"); if(m) m.remove(); }
function openOsMenu(e) {
  e.stopPropagation(); closeOsMenu();
  const items = [["◎","Explore"],["›","Advance phase"],["⏩","Fast-forward"],["▶","Apply"],["✓","Verify"],["▣","Archive"],["⊘","Detach"]];
  const m = document.createElement("div"); m.className="osmenu"; m.id="osmenu";
  m.innerHTML = items.map(([g,l])=>`<button><span class="g">${g}</span>${l}</button>`).join("");
  m.addEventListener("click", ev=>ev.stopPropagation());
  document.getElementById("menuRoot").appendChild(m);
  const r = e.target.getBoundingClientRect();
  m.style.left = Math.min(r.left, window.innerWidth-160) + "px";
  m.style.top  = (r.bottom + 4) + "px";
  setTimeout(()=>document.addEventListener("click", closeOsMenu, { once:true }), 0);
}

function render() {
  board.innerHTML = "";
  STATE.groups.forEach(g => {
    const col = document.createElement("div");
    col.className = "column"; col.dataset.group = g.id; col.draggable = false;
    const cards = STATE.cards.filter(c => c.group === g.id && cardVisible(c)).sort((a,b)=>a.order-b.order);
    col.innerHTML = `
      <div class="col-head" draggable="true">
        <span class="dot" style="background:${g.color}"></span>
        <span class="name">${g.name}</span>
        <span class="count">${cards.length}</span>
        <span class="plus" title="New proposal in this group" onclick="event.stopPropagation(); openProposalDialog('${g.id}')">＋</span>
        <span class="gear" title="Rename · recolor · delete group">⚙</span>
        <span class="grip" title="Drag to reorder">⠿</span>
      </div>
      <div class="col-body ${cards.length?'':'empty'}">${cards.length?'':'No proposals'}</div>`;
    const body = col.querySelector(".col-body");
    cards.forEach(c => body.appendChild(cardEl(c)));
    wireColumn(col, body);
    board.appendChild(col);
  });
  const addg = document.createElement("div");
  addg.className = "addgroup"; addg.textContent = "+ Add group";
  board.appendChild(addg);
}

const STEP_DEFS = [
  ["explore","Explore","◎"],["proposal","Proposal","P"],["design","Design","D"],
  ["specs","Specs","S"],["tasks","Tasks","T"],["apply","Apply","▶"],["archive","Archive","▣"],
];
function stepperRow(c) {
  const st = c.steps || {};
  let html = `<div class="stepper" title="OpenSpec lifecycle — click a node to open its artifact">`;
  STEP_DEFS.forEach(([id,label,glyph], i) => {
    const state = st[id] || "todo";
    const prev = i>0 ? (st[STEP_DEFS[i-1][0]] || "todo") : null;
    const active = prev && (prev==="done"||prev==="current") && (state==="done"||state==="current");
    const content = state==="done" ? "✓" : glyph;
    const sub = id==="tasks" && c.total>0 ? `${c.done}/${c.total}` : "";
    html += `<div class="snode ${state} ${active?"line-active":""}" title="${label}">
      ${i>0?`<span class="line"></span>`:``}
      <span class="circle">${content}</span>
      <span class="lbl">${label}</span>
      ${sub?`<span class="sub">${sub}</span>`:``}
    </div>`;
  });
  return html + `</div>`;
}

function cardEl(c) {
  const el = document.createElement("div");
  el.className = "card"; el.draggable = true; el.dataset.id = c.id;
  const pct = c.total ? Math.round(100*c.done/c.total) : 0;
  const sess = visibleSessions(c);
  el.innerHTML = `
    <div class="card-top">
      <span class="card-name">${c.name}</span>
      <span class="pill ${c.state}">${c.state}</span>
    </div>
    ${stepperRow(c)}
    ${c.total ? `<div class="progress"><div class="bar"><i style="width:${pct}%"></i></div>
       <div class="label">${c.done}/${c.total} tasks · ${pct}%</div></div>` : ``}
    ${sess.length ? `<div class="sessions">${sess.map(s=>sessRow(s,c)).join("")}</div>`:``}
    <div class="card-actions">
      <button class="act-session" title="Spawn a session attached to this proposal">▶ New session</button>
      <button class="act-worktree" title="Spawn a worktree for this proposal">⑂ New worktree</button>
    </div>`;
  el.addEventListener("dragstart", e => { dragCard=c.id; el.classList.add("dragging"); e.stopPropagation(); });
  el.addEventListener("dragend", () => { dragCard=null; el.classList.remove("dragging"); });
  el.addEventListener("dragover", e => {
    e.preventDefault(); e.stopPropagation();
    const r = el.getBoundingClientRect();
    const after = e.clientY > r.top + r.height/2;
    el.classList.toggle("drop-after", after); el.classList.toggle("drop-before", !after);
  });
  el.addEventListener("dragleave", () => el.classList.remove("drop-before","drop-after"));
  el.addEventListener("drop", e => {
    e.preventDefault(); e.stopPropagation();
    const after = el.classList.contains("drop-after");
    el.classList.remove("drop-before","drop-after");
    if (!dragCard || dragCard===c.id) return;
    reorderCard(dragCard, c, after); render();
  });
  return el;
}

function sessRow(s, c) {
  return `<div class="sess ${s.live?'pulse':''}" title="open chat view">
    <div class="srow">
      <span class="sdot ${s.live?'pulse':''}" style="background:${s.color}"></span>
      <span class="sname">${s.name}</span>
      <span class="age">${s.age||''}</span>
      <span class="sact">
        <button class="resume" title="Resume / continue session" onclick="event.stopPropagation()">↻</button>
        <button class="fork" title="Fork session" onclick="event.stopPropagation()">⑂</button>
        <button class="hide" title="Hide session" onclick="event.stopPropagation()">⊘</button>
        <button class="os" title="OpenSpec commands — explore · advance · apply · verify · archive · detach" onclick="openOsMenu(event)">⋯</button>
      </span>
    </div>
    <div class="srow">
      ${s.phase?`<span class="sphase ${s.phase}">${s.phase}${s.sdone!=null?` ${s.sdone}/${s.stotal}`:''}</span>`:``}
      <span class="verb" style="color:${s.live?'var(--green)':'var(--text-muted)'}">${s.verb||''}</span>
    </div>
    <div class="srow">
      <span class="stats">${s.tin}↑ ${s.tout}↓</span>
      <span class="ctx" title="context ${s.ctx}%"><i style="width:${s.ctx}%"></i></span>
      <span class="stats">$${s.cost}</span>
    </div>
    ${s.worktree?wtLine(s,c):``}
  </div>`;
}

function wtLine(s, c) {
  const has = s.wtTotal>0;
  const pct = has ? Math.round(100*s.wtDone/s.wtTotal) : 0;
  const delta = has ? s.wtDone - (c.done||0) : 0;          // vs proposal (main)
  const dcls = delta>0 ? "ahead" : delta<0 ? "behind" : "";
  const dtxt = delta>0 ? `+${delta}` : delta<0 ? `${delta}` : "±0";
  return `<div class="srow" title="Worktree tasks.md — may differ from proposal (main)">
    <span class="wt" title="from ${s.base}">⎇ ${s.worktree}</span>
    ${has?`<span class="wtbar"><i style="width:${pct}%"></i></span>
      <span class="wtcount">${s.wtDone}/${s.wtTotal}</span>
      <span class="wtdelta ${dcls}">${dtxt}</span>`:``}
  </div>`;
}

function reorderCard(srcId, targetCard, after) {
  const src = STATE.cards.find(x=>x.id===srcId); if (!src) return;
  src.group = targetCard.group;
  const peers = STATE.cards.filter(c=>c.group===targetCard.group && c.id!==srcId).sort((a,b)=>a.order-b.order);
  const idx = peers.findIndex(c=>c.id===targetCard.id) + (after?1:0);
  peers.splice(idx,0,src);
  peers.forEach((c,i)=>c.order=i);
}

function wireColumn(col, body) {
  const head = col.querySelector(".col-head");
  head.addEventListener("dragstart", e => { dragCol=col.dataset.group; col.classList.add("dragging"); });
  head.addEventListener("dragend", () => { dragCol=null; col.classList.remove("dragging"); });
  col.addEventListener("dragover", e => { e.preventDefault(); col.classList.add("dropzone"); });
  col.addEventListener("dragleave", () => col.classList.remove("dropzone"));
  col.addEventListener("drop", e => {
    e.preventDefault(); col.classList.remove("dropzone");
    if (dragCard) {                       // move card → this group
      const c = STATE.cards.find(x=>x.id===dragCard); if (c) c.group = col.dataset.group;
    } else if (dragCol && dragCol!==col.dataset.group) {  // reorder columns
      const from = STATE.groups.findIndex(g=>g.id===dragCol);
      const to   = STATE.groups.findIndex(g=>g.id===col.dataset.group);
      const [m] = STATE.groups.splice(from,1); STATE.groups.splice(to,0,m);
    }
    render();
  });
}
initFilters();
render();
</script>
</body>
