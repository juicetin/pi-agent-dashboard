<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>Preset chip — inner border (final)</title>
<style>
  .light{--bg:#fff;--bg-tertiary:#f0f0f0;--bg-hover:rgba(0,0,0,.06);--text-secondary:#444;--text-primary:#1a1a1a;--text-muted:#999;--border-secondary:#ccc;--accent-blue:#2563eb;--accent-red:#ef4444}
  .dark{--bg:#141414;--bg-tertiary:#1e1e1e;--bg-hover:rgba(255,255,255,.06);--text-secondary:#b0b0b0;--text-primary:#e5e5e5;--text-muted:#585858;--border-secondary:#333;--accent-blue:#3b82f6;--accent-red:#ef4444}
  *{box-sizing:border-box}
  body{margin:0;padding:40px;font-family:ui-sans-serif,system-ui,sans-serif}
  .pane{padding:24px;border-radius:10px;margin-bottom:20px;background:var(--bg)}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:12px}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  /* chip = inline-flex items-stretch overflow-hidden rounded-md */
  .chip{display:inline-flex;align-items:stretch;overflow:hidden;border-radius:6px;font-size:11px}
  .active{background:var(--accent-blue);color:#fff}
  .idle{background:var(--bg-tertiary);color:var(--text-secondary)}
  .load{padding:4px 10px;background:none;border:none;color:inherit;cursor:pointer;font-size:11px}
  .idle .load:hover{color:var(--text-primary)}
  .del{display:flex;align-items:center;justify-content:center;padding:0 8px;font-size:12px;line-height:1;border:none;background:none;cursor:pointer;border-left:1px solid}
  .active .del{border-left-color:rgba(255,255,255,.3);color:rgba(255,255,255,.7)}
  .active .del:hover{color:#fff;background:rgba(255,255,255,.15)}
  .idle .del{border-left-color:var(--border-secondary);color:var(--text-muted)}
  .idle .del:hover{color:var(--accent-red);background:var(--bg-hover)}
  .save{padding:4px 10px;font-size:11px;border-radius:6px;background:var(--bg-tertiary);color:var(--text-muted);border:none;cursor:pointer}
</style></head><body>
  <div class="lbl" style="color:#888">Final preset chip — inner border separates label and × (full-height divider, padded)</div>
  <div class="pane light">
    <div class="lbl">Light theme</div>
    <div class="row">
      <span class="chip active"><button class="load">Anthropic</button><button class="del">×</button></span>
      <span class="chip idle"><button class="load">Opencode Deepseek</button><button class="del">×</button></span>
      <span class="chip idle"><button class="load">Haiku</button><button class="del">×</button></span>
      <button class="save">+ Save current as preset</button>
    </div>
  </div>
  <div class="pane dark">
    <div class="lbl">Dark theme</div>
    <div class="row">
      <span class="chip active"><button class="load">Anthropic</button><button class="del">×</button></span>
      <span class="chip idle"><button class="load">Opencode Deepseek</button><button class="del">×</button></span>
      <span class="chip idle"><button class="load">Haiku</button><button class="del">×</button></span>
      <button class="save">+ Save current as preset</button>
    </div>
  </div>
</body></html>
