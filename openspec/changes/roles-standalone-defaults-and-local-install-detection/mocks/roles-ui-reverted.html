<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<title>Roles UI — reverted compact + fixed ×</title>
<style>
  :root{--bg-primary:#fff;--bg-secondary:#fafafa;--bg-tertiary:#f0f0f0;--bg-hover:rgba(0,0,0,.04);
    --text-primary:#1a1a1a;--text-secondary:#444;--text-tertiary:#777;--text-muted:#aaa;
    --border-primary:#e0e0e0;--border-secondary:#ccc;--accent-blue:#2563eb;--accent-warning:#f59e0b;--accent-red:#ef4444;}
  *{box-sizing:border-box}
  body{margin:0;padding:40px;background:#f4f4f4;font-family:ui-sans-serif,system-ui,sans-serif;font-size:14px;color:var(--text-primary)}
  .mono{font-family:ui-monospace,Menlo,Consolas,monospace}
  .wrap{max-width:560px;margin:0 auto}
  .cap{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);margin-bottom:12px}
  .section{border:1px solid var(--border-primary);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:12px;background:#fff}
  .head{display:flex;align-items:baseline;justify-content:space-between}
  .head h3{margin:0;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-secondary)}
  .gl{font-size:10px;color:var(--text-muted)}
  .banner{font-size:11px;color:var(--accent-warning);border:1px solid var(--border-secondary);border-radius:4px;padding:6px 8px;background:var(--bg-tertiary)}
  .presets{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;border-radius:6px;font-size:11px}
  .chip.active{background:var(--accent-blue);color:#fff}
  .chip.idle{background:var(--bg-tertiary);color:var(--text-secondary)}
  .chip .load{padding:4px 8px 4px 10px;background:none;border:none;color:inherit;cursor:pointer;font-size:11px}
  .chip .del{margin-right:6px;width:16px;height:16px;border-radius:999px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;line-height:1}
  .chip.active .del{color:rgba(255,255,255,.6)} .chip.active .del:hover{color:#fff;background:rgba(255,255,255,.25)}
  .chip.idle .del{color:var(--text-muted)} .chip.idle .del:hover{color:var(--accent-red);background:var(--bg-hover)}
  .savechip{padding:4px 10px;font-size:11px;border-radius:6px;background:var(--bg-tertiary);color:var(--text-muted);border:none;cursor:pointer}
  .tools{display:flex;gap:8px}
  .btn{font-size:11px;padding:4px 10px;border-radius:6px;border:none;cursor:pointer}
  .save-off{background:var(--bg-tertiary);color:var(--text-muted)} .reload{background:var(--bg-tertiary);color:var(--text-secondary)}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px}
  .pill{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:4px;background:var(--bg-tertiary);text-align:left;border:none;cursor:pointer;min-width:0}
  .pill:hover{background:#e8e8e8}
  .rn{font-size:11px;font-weight:600;color:rgba(37,99,235,.7);flex:none}
  .mdl{font-size:11px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .add{font-size:11px;color:var(--accent-blue);flex:1}
</style></head><body><div class="wrap">
  <div class="cap">Reverted · compact grid + fixed preset ×</div>
  <div class="section">
    <div class="head"><h3>Roles</h3><span class="gl">global role → model assignments</span></div>
    <div class="banner">No roles have been set up — set up now by assigning a model to a role below.</div>
    <div class="presets">
      <span class="chip active"><button class="load">Anthropic</button><button class="del">×</button></span>
      <span class="chip idle"><button class="load">Opencode Deepseek</button><button class="del">×</button></span>
      <span class="chip idle"><button class="load">Haiku</button><button class="del">×</button></span>
      <button class="savechip">+ Save current as preset</button>
    </div>
    <div class="tools"><button class="btn save-off">Save</button><button class="btn reload">Reload</button></div>
    <div class="grid">
      <button class="pill"><span class="rn">@planning</span><span class="mdl mono">claude-opus-4-8</span></button>
      <button class="pill"><span class="rn">@coding</span><span class="mdl mono">claude-opus-4-7</span></button>
      <button class="pill"><span class="rn">@compact</span><span class="add">+ Add model</span></button>
      <button class="pill"><span class="rn">@fast</span><span class="add">+ Add model</span></button>
      <button class="pill"><span class="rn">@research</span><span class="mdl mono">claude-sonnet-4-6</span></button>
      <button class="pill"><span class="rn">@vision</span><span class="add">+ Add model</span></button>
    </div>
  </div>
</div></body></html>
