<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Kraken Brain — Hero</title>
<style>
  /* Astro convention: light is default, dark applies via `.dark` on <html>.
     Palette mirrors the host site's pi-* tokens (slate/indigo/violet). */
  :root {
    color-scheme: light;
    /* ---- Page chrome (light default — matches site slate-50) ---- */
    --page-bg-1: rgb(248 250 252);     /* slate-50          */
    --page-bg-2: rgb(241 245 249);     /* slate-100         */
    --page-bg-3: rgb(255 255 255);
    --hero-bg:   rgb(248 250 252);
    --copy-fg:   rgb(15 23 42);        /* slate-900         */
    --copy-fg-2: rgb(71 85 105);       /* slate-600         */
    --copy-accent: rgb(99 102 241);    /* indigo-500        */
    --copy-shadow: 0 1px 0 rgba(255,255,255,.6);
    --vignette:  radial-gradient(closest-side at 50% 50%, transparent 60%, rgba(60,80,140,.10) 100%);
    --panel-bg:  rgba(255, 255, 255, 0.78);
    --panel-fg:  rgb(15 23 42);
    --panel-fg-dim: rgb(71 85 105);
    --panel-border: rgba(99, 102, 241, .25);
    --btn-bg:    rgba(255,255,255,.7);
    --btn-fg:    rgb(15 23 42);
    --btn-border: rgba(99, 102, 241, .35);
    --btn-primary-bg: linear-gradient(135deg, rgb(99 102 241) 0%, rgb(124 58 237) 100%);
    --btn-primary-fg: #ffffff;
    --slider-track: rgba(99, 102, 241, .25);
    --slider-fill:  rgb(99 102 241);

    /* ---- Canvas tokens (consumed by the JS renderer) ---- */
    /* The host Astro site can override any of these globally. */
    --kb-bg:        rgb(248 250 252);          /* slate-50         */
    --kb-accent-1:  rgb(99 102 241);           /* indigo-500       */
    --kb-accent-2:  rgb(124 58 237);           /* violet-600       */
    --kb-stream:    rgba(67, 56, 202, 1);      /* indigo-700       */
    --kb-brain-1:   rgba(165, 180, 252, 1);    /* indigo-300       */
    --kb-brain-2:   rgba(99, 102, 241, 1);     /* indigo-500       */
    --kb-brain-3:   rgba(67, 56, 202, 0.95);   /* indigo-700       */
    --kb-halo-1:    rgba(99, 102, 241, 0.18);  /* indigo-500 / 18% */
    --kb-halo-2:    rgba(124, 58, 237, 0.08);  /* violet-600 /  8% */
    --kb-glow-top:  rgba(99, 102, 241, 0.14);  /* mirrors --pi-glow-strength */
    --kb-tent-hue-min: 230;
    --kb-tent-hue-max: 265;
    --kb-tent-sat:     65;
    --kb-tent-l-outer: 65;
    --kb-tent-l-mid:   55;
    --kb-tent-l-core:  45;
    --kb-tent-a-outer: 0.12;
    --kb-tent-a-mid:   0.28;
    --kb-tent-a-core:  0.65;
    --kb-ring-blend:   source-over;
  }
  :root.dark {
    color-scheme: dark;
    --page-bg-1: rgb(2 6 23);          /* slate-950         */
    --page-bg-2: rgb(15 23 42);        /* slate-900         */
    --page-bg-3: rgb(2 6 23);
    --hero-bg:   rgb(2 6 23);
    --copy-fg:   rgb(248 250 252);
    --copy-fg-2: rgb(148 163 184);     /* slate-400         */
    --copy-accent: rgb(129 140 248);   /* indigo-400        */
    --copy-shadow: 0 0 24px rgba(129,140,248,.45), 0 0 60px rgba(139,92,246,.25);
    --vignette:  radial-gradient(closest-side at 50% 50%, transparent 55%, rgba(0,0,0,.55) 100%);
    --panel-bg:  rgba(15, 23, 42, 0.65);
    --panel-fg:  rgb(226 232 240);
    --panel-fg-dim: rgb(148 163 184);
    --panel-border: rgba(129, 140, 248, .30);
    --btn-bg:    rgba(30, 41, 59, .55);
    --btn-fg:    rgb(248 250 252);
    --btn-border: rgba(129, 140, 248, .35);
    --btn-primary-bg: linear-gradient(135deg, rgb(129 140 248) 0%, rgb(139 92 246) 100%);
    --btn-primary-fg: rgb(2 6 23);
    --slider-track: rgba(129, 140, 248, .22);
    --slider-fill:  rgb(129 140 248);

    /* Canvas tokens (dark) */
    --kb-bg:        rgb(2 6 23);                /* slate-950        */
    --kb-accent-1:  rgb(129 140 248);           /* indigo-400       */
    --kb-accent-2:  rgb(139 92 246);            /* violet-500       */
    --kb-stream:    rgba(199, 210, 254, 1);     /* indigo-200       */
    --kb-brain-1:   rgba(224, 231, 255, 1);     /* indigo-100       */
    --kb-brain-2:   rgba(129, 140, 248, 1);     /* indigo-400       */
    --kb-brain-3:   rgba(139, 92, 246, 0.92);   /* violet-500       */
    --kb-halo-1:    rgba(129, 140, 248, 0.32);
    --kb-halo-2:    rgba(139, 92, 246, 0.14);
    --kb-glow-top:  rgba(129, 140, 248, 0.28);  /* mirrors --pi-glow-strength */
    --kb-tent-hue-min: 230;
    --kb-tent-hue-max: 270;
    --kb-tent-sat:     85;
    --kb-tent-l-outer: 70;
    --kb-tent-l-mid:   72;
    --kb-tent-l-core:  85;
    --kb-tent-a-outer: 0.16;
    --kb-tent-a-mid:   0.40;
    --kb-tent-a-core:  0.78;
    --kb-ring-blend:   lighter;
  }

  html,body { margin:0; padding:0; height:100%; background: var(--hero-bg); overflow:hidden; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif; }
  .hero {
    position: relative; width: 100%; height: 100vh; min-height: 520px; overflow: hidden;
    background: radial-gradient(60% 80% at 50% 50%, var(--page-bg-1) 0%, var(--page-bg-2) 45%, var(--page-bg-3) 100%);
  }
  .hero canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
  .hero .vignette { position:absolute; inset:0; pointer-events:none; background: var(--vignette); }
  .hero .copy {
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding: 0 6vw; pointer-events:none; z-index:2;
  }
  .hero h1 {
    font-size: clamp(2rem, 6vw, 4.75rem); font-weight: 800; letter-spacing: -0.02em; margin: 0 0 .6rem;
    color: var(--copy-fg); text-shadow: var(--copy-shadow);
  }
  .hero h1 span { color: var(--copy-accent); }
  .hero p { margin: 0; max-width: 60ch; color: var(--copy-fg-2); font-size: clamp(1rem, 1.6vw, 1.2rem); line-height:1.5; }
  .hero .cta { pointer-events:auto; margin-top: 1.6rem; display:inline-flex; gap:.7rem; }
  .hero .cta a {
    text-decoration:none; padding: .8rem 1.2rem; border-radius: 10px; font-weight:600; font-size:.95rem;
    border: 1px solid var(--btn-border); color: var(--btn-fg); background: var(--btn-bg);
    backdrop-filter: blur(6px);
    transition: transform .15s ease, background .15s ease, border-color .15s ease;
  }
  .hero .cta a.primary { background: var(--btn-primary-bg); border-color: transparent; color: var(--btn-primary-fg); }
  .hero .cta a:hover { transform: translateY(-1px); }

  /* ---- Controls panel ---- */
  .panel {
    position: absolute; top: 14px; right: 14px; z-index: 5;
    width: 280px; max-width: calc(100vw - 28px);
    background: var(--panel-bg); color: var(--panel-fg);
    border: 1px solid var(--panel-border); border-radius: 12px;
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    font-size: 13px; line-height: 1.35;
    transition: opacity .15s ease;
  }
  .panel header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 12px; border-bottom: 1px solid var(--panel-border);
    user-select: none; cursor: pointer;
  }
  .panel header .title { font-weight:700; letter-spacing:.02em; }
  .panel header .chev { transition: transform .2s ease; opacity:.7; }
  .panel.collapsed .chev { transform: rotate(-90deg); }
  .panel .body { padding: 10px 12px 12px; display: grid; gap: 10px; }
  .panel.collapsed .body { display: none; }

  .row { display:grid; grid-template-columns: 1fr auto; gap: 6px 10px; align-items:center; }
  .row label { color: var(--panel-fg-dim); font-size: 12px; }
  .row .val { font-variant-numeric: tabular-nums; font-size: 12px; color: var(--panel-fg); min-width: 2.5ch; text-align:right; }
  .row input[type="range"] { grid-column: 1 / -1; width: 100%; accent-color: var(--slider-fill); }

  .seg { display:inline-flex; gap: 0; border:1px solid var(--btn-border); border-radius: 8px; overflow:hidden; }
  .seg button {
    appearance:none; border:0; background: transparent; color: var(--btn-fg);
    font: inherit; padding: 5px 10px; cursor: pointer;
  }
  .seg button + button { border-left: 1px solid var(--btn-border); }
  .seg button[aria-pressed="true"] { background: var(--btn-primary-bg); color: var(--btn-primary-fg); }

  .panel .actions { display:flex; gap:8px; justify-content:space-between; align-items:center; margin-top: 4px; }
  .panel .reset {
    appearance:none; background: transparent; color: var(--panel-fg-dim); border: 1px solid var(--panel-border);
    border-radius: 8px; padding: 5px 9px; font: inherit; font-size: 12px; cursor: pointer;
  }
  .panel .reset:hover { color: var(--panel-fg); border-color: var(--btn-border); }

  /* Compact toggle when panel is closed on narrow screens */
  @media (max-width: 480px) {
    .panel { width: calc(100vw - 28px); }
  }
</style>
</head>
<body>
<section class="hero" aria-label="Kraken Brain animated hero">
  <canvas id="krakenBrain" aria-hidden="true"></canvas>
  <div class="vignette"></div>

  <div class="copy">
    <h1>The <span>Kraken Brain</span></h1>
    <p>Eight tentacles of intelligence, one pulsing core. Streams of data, signal, and thought — converging.</p>
    <div class="cta">
      <a class="primary" href="#get-started">Get started</a>
      <a href="#learn-more">Learn more</a>
    </div>
  </div>

  <aside class="panel" id="panel" aria-label="Animation controls">
    <header id="panelHeader">
      <span class="title">Controls</span>
      <span class="chev" aria-hidden="true">▾</span>
    </header>
    <div class="body">
      <div class="row">
        <label for="theme">Theme</label>
        <div class="seg" role="group" aria-label="Theme">
          <button data-theme="light" id="themeLight">Light</button>
          <button data-theme="dark"  id="themeDark">Dark</button>
          <button data-theme="auto"  id="themeAuto">Auto</button>
        </div>
      </div>

      <div class="row">
        <label for="tentacles">Tentacles</label><span class="val" id="vTentacles">8</span>
        <input type="range" id="tentacles" min="3" max="14" step="1" value="8">
      </div>

      <div class="row">
        <label for="streams">Streams / tentacle</label><span class="val" id="vStreams">8</span>
        <input type="range" id="streams" min="0" max="20" step="1" value="8">
      </div>

      <div class="row">
        <label for="rings">Ripple rings</label><span class="val" id="vRings">4</span>
        <input type="range" id="rings" min="0" max="8" step="1" value="4">
      </div>

      <div class="row">
        <label for="speed">Speed</label><span class="val" id="vSpeed">1.00×</span>
        <input type="range" id="speed" min="0" max="2.5" step="0.05" value="1">
      </div>

      <div class="row">
        <label for="wobble">Wobble</label><span class="val" id="vWobble">1.00×</span>
        <input type="range" id="wobble" min="0" max="2" step="0.05" value="1">
      </div>

      <div class="row">
        <label for="hue">Hue shift</label><span class="val" id="vHue">0°</span>
        <input type="range" id="hue" min="-180" max="180" step="1" value="0">
      </div>

      <div class="row">
        <label for="dpr">Quality (DPR)</label><span class="val" id="vDpr">1.25</span>
        <input type="range" id="dpr" min="0.5" max="2" step="0.25" value="1.25">
      </div>

      <div class="actions">
        <button class="reset" id="reset">Reset</button>
        <span class="val" id="fps" title="Frames per second">— fps</span>
      </div>
    </div>
  </aside>
</section>

<script>
(() => {
  const canvas = document.getElementById('krakenBrain');
  const ctx = canvas.getContext('2d', { alpha: true });
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const sysDark = matchMedia('(prefers-color-scheme: dark)');

  // ---------- Settings (persisted) ----------
  const KEY = 'kraken-hero-settings-v1';
  const DEFAULTS = {
    theme: 'auto', tentacles: 8, streams: 8, rings: 4,
    speed: 1, wobble: 1, hue: 0, dpr: 1.25,
  };
  let S = loadSettings();

  function loadSettings() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return { ...DEFAULTS };
      return { ...DEFAULTS, ...JSON.parse(raw) };
    } catch { return { ...DEFAULTS }; }
  }
  function saveSettings() {
    try { localStorage.setItem(KEY, JSON.stringify(S)); } catch {}
  }

  // ---------- Theme ----------
  // Effective theme resolution order:
  //   1. Internal control (S.theme) if 'light' or 'dark'
  //   2. Host site override: <html data-theme="light|dark"> when S.theme === 'auto'
  //   3. prefers-color-scheme
  // Astro convention: <html class="dark"> means dark theme.
  function hostTheme() {
    if (document.documentElement.classList.contains('dark')) return 'dark';
    // Allow data-theme as a secondary mechanism if the host prefers that.
    const v = document.documentElement.getAttribute('data-theme');
    if (v === 'light' || v === 'dark') return v;
    return null;
  }
  function effectiveTheme() {
    if (S.theme === 'light' || S.theme === 'dark') return S.theme;
    return hostTheme() || (sysDark.matches ? 'dark' : 'light');
  }
  function applyTheme() {
    const root = document.documentElement;
    if (S.theme === 'dark')      root.classList.add('dark');
    else if (S.theme === 'light') root.classList.remove('dark');
    // 'auto' — leave the host's classList alone; effectiveTheme() resolves
    // it from class / data-theme / prefers-color-scheme on read.
    for (const id of ['themeLight','themeDark','themeAuto']) {
      const el = document.getElementById(id);
      el.setAttribute('aria-pressed', el.dataset.theme === S.theme ? 'true' : 'false');
    }
    rebuildLayers();
  }
  sysDark.addEventListener('change', () => { if (S.theme === 'auto') applyTheme(); });
  // Watch host page for theme changes (Astro toggles `.dark` on <html>).
  new MutationObserver(() => { if (S.theme === 'auto') applyTheme(); })
    .observe(document.documentElement, { attributes: true, attributeFilter: ['class', 'data-theme'] });

  // ---------- Brain image (loaded once, then alpha-keyed) ----------
  // Inlined as base64 so getImageData works under file:// and any origin.
  // Source PNG also written next to this file as `brain-neon.png` for reference.

      dark,
      base:        cssVar('--kb-bg', dark ? 'rgb(2 6 23)' : 'rgb(248 250 252)'),
      glowTop, glowBottom, dotColor, accent1Solid,
      ringHaloA:   dark ? [0.18, 0.03] : [0.12, 0.025],
      rippleCyan:  (a) => withAlpha(accent1, (a * (dark ? 1.0 : 0.7)).toFixed(3)),
      rippleGold:  (a) => withAlpha(accent2, (a * (dark ? 1.0 : 0.45)).toFixed(3)),
      streamFill:  (a) => withAlpha(stream,  (a * (dark ? 1.0 : 0.55)).toFixed(3)),
      brainCmap:   [brain1, brain2, brain3],
      brainHl:     dark ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.55)',
      halo:        [halo1, halo2, 'rgba(0,0,0,0)'],
      ringBlend:   (ringBlend === 'lighter' || ringBlend === 'source-over') ? ringBlend : (dark ? 'lighter' : 'source-over'),
      tentaclePassAlpha:    [
        cssNum('--kb-tent-a-outer', dark ? 0.18 : 0.10),
        cssNum('--kb-tent-a-mid',   dark ? 0.45 : 0.22),
        cssNum('--kb-tent-a-core',  dark ? 0.85 : 0.55),
      ],
      tentacleHueLightness: [
        cssNum('--kb-tent-l-outer', dark ? 70 : 60),
        cssNum('--kb-tent-l-mid',   dark ? 75 : 50),
        cssNum('--kb-tent-l-core',  dark ? 90 : 38),
      ],
      tentacleHueRange: [
        cssNum('--kb-tent-hue-min', dark ? 185 : 180),
        cssNum('--kb-tent-hue-max', dark ? 265 : 205),
      ],
      tentacleSaturation: cssNum('--kb-tent-sat', dark ? 90 : 55),
      // Procedural fallback only — unused when image loads.
      brainBody:   dark
        ? ['rgba(220, 250, 255, 0.90)','rgba(80, 200, 240, 0.55)','rgba(20, 60, 120, 0.05)']
        : ['rgba(255, 255, 255, 0.95)','rgba(120, 200, 230, 0.45)','rgba(20, 80, 130, 0.10)'],
      brainGyri:   dark ? 'rgba(180, 245, 255, 0.85)' : 'rgba(20, 100, 140, 0.75)',
      brainEdge:   dark ? 'rgba(230, 255, 255, 0.92)' : 'rgba(10, 70, 110, 0.70)',
    };
  }

  // ---------- Build static background layer ----------
  // Mirrors the host site's background composition:
  //   1. flat slate base                                 (--kb-bg)
  //   2. top radial glow ellipse 80% 50% at 50% -10%     (--kb-glow-top)
  //   3. soft accent2 lift at the bottom for depth
  //   4. faint dot-grid (host site signature)
  //   5. a few decorative "bubble" rings (matches Hero.astro vibes)
  //   6. subtle halo rings around the brain centre
  function buildBackground() {
    const P = palette();
    const dark = P.dark;
    const c = bgLayer;
    c.width = Math.floor(W * DPR);
    c.height = Math.floor(H * DPR);
    const g = c.getContext('2d');
    g.setTransform(DPR, 0, 0, DPR, 0, 0);
    g.clearRect(0, 0, W, H);

    // 1. Base
    g.fillStyle = P.base;
    g.fillRect(0, 0, W, H);

    // 2. Top-of-hero radial glow (matches body backdrop)
    {
      const cxg = W * 0.5, cyg = -H * 0.10;
      const rg  = Math.max(W, H) * 0.95;
      const grd = g.createRadialGradient(cxg, cyg, rg * 0.05, cxg, cyg, rg);
      grd.addColorStop(0, P.glowTop);
      grd.addColorStop(0.7, withAlpha(P.glowTop, 0));
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      g.fillStyle = grd;
      g.fillRect(0, 0, W, H);
    }
    // 3. Bottom violet lift
    {
      const cxg = W * 0.5, cyg = H * 1.1;
      const rg  = Math.max(W, H) * 0.85;
      const grd = g.createRadialGradient(cxg, cyg, rg * 0.05, cxg, cyg, rg);
      grd.addColorStop(0, P.glowBottom);
      grd.addColorStop(0.7, withAlpha(P.glowBottom, 0));
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      g.fillStyle = grd;
      g.fillRect(0, 0, W, H);
    }

    // 4. Faint dot grid (32px lattice, mirrors site pi-dot-grid)
    {
      const step = 32;
      const dotR = 1;
      g.fillStyle = withAlpha(P.dotColor, dark ? 0.18 : 0.22);
      for (let y = 0; y < H; y += step) {
        for (let x = 0; x < W; x += step) {
          g.beginPath(); g.arc(x, y, dotR, 0, Math.PI * 2); g.fill();
        }
      }
    }

    // 5. Decorative bubble rings (subtle, scattered)
    g.lineWidth = 1;
    g.strokeStyle = withAlpha(P.dotColor, dark ? 0.16 : 0.20);
    for (let i = 0; i < 22; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const r = 6 + Math.random() * 28;
      g.beginPath(); g.arc(x, y, r, 0, Math.PI * 2); g.stroke();
    }

    // 6. Halo rings around centre (kept faint)
    g.globalCompositeOperation = P.ringBlend;
    for (let k = 1; k <= 4; k++) {
      const r = (40 + k * 22) * scale;
      const a = P.ringHaloA[0] - k * P.ringHaloA[1];
      g.strokeStyle = withAlpha(P.accent1Solid, a);
      g.lineWidth = 1 * scale;
      g.beginPath(); g.arc(cx, cy, r, 0, Math.PI * 2); g.stroke();
    }
    g.globalCompositeOperation = 'source-over';
  }

  // ---------- Build brain layer ----------
  function buildBrain() {
    const P = palette();
    const dark = effectiveTheme() === 'dark';
    const size = Math.ceil(300 * scale);
    const c = brainLayer;
    c.width = Math.floor(size * DPR);
    c.height = Math.floor(size * DPR);
    const g = c.getContext('2d');
    g.setTransform(DPR, 0, 0, DPR, 0, 0);
    g.clearRect(0, 0, size, size);
    const r0 = size / 2;

    // Outer halo
    g.globalCompositeOperation = dark ? 'lighter' : 'source-over';
    const halo = g.createRadialGradient(r0, r0, r0 * 0.15, r0, r0, r0);
    halo.addColorStop(0, P.halo[0]);
    halo.addColorStop(0.45, P.halo[1]);
    halo.addColorStop(1, P.halo[2]);
    g.fillStyle = halo;
    g.beginPath(); g.arc(r0, r0, r0, 0, Math.PI * 2); g.fill();
    g.globalCompositeOperation = 'source-over';

    if (brainImgKeyed) {
      // ---- Image-driven brain ----
      // Apply theme colormap in BOTH modes via source-in masking, so the
      // canvas neon adapts to whatever colors the host site provides via
      // CSS variables (--kb-brain-1/2/3). Brain is rotated 90°.
      const brainSize = size * 0.78;

      // Build colormap-tinted brain into a temp canvas.
      const tw = Math.ceil(brainSize * DPR);
      const tmp = document.createElement('canvas');
      tmp.width = tw; tmp.height = tw;
      const tg = tmp.getContext('2d');
      tg.setTransform(DPR, 0, 0, DPR, 0, 0);
      tg.drawImage(brainImgKeyed, 0, 0, brainSize, brainSize);

      // Colormap: fill the brain shape with theme gradient.
      tg.globalCompositeOperation = 'source-in';
      const grd = tg.createRadialGradient(
        brainSize / 2, brainSize / 2 - brainSize * 0.1, 0,
        brainSize / 2, brainSize / 2, brainSize / 2
      );
      grd.addColorStop(0,   P.brainCmap[0]);
      grd.addColorStop(0.6, P.brainCmap[1]);
      grd.addColorStop(1,   P.brainCmap[2]);
      tg.fillStyle = grd;
      tg.fillRect(0, 0, brainSize, brainSize);
      tg.globalCompositeOperation = 'source-over';

      // Draw upright (matches the source kraken image's lateral profile).
      const x = r0 - brainSize / 2;
      const y = r0 - brainSize / 2;
      if (dark) {
        g.globalCompositeOperation = 'lighter';
        g.globalAlpha = 0.55;
        g.drawImage(tmp, x, y, brainSize, brainSize);
        g.globalAlpha = 0.85;
        g.drawImage(tmp, x, y, brainSize, brainSize);
        g.globalAlpha = 1;
        g.globalCompositeOperation = 'source-over';
      } else {
        g.drawImage(tmp, x, y, brainSize, brainSize);
      }

      // Subtle inner highlight (rotation-invariant, just centered)
      g.globalCompositeOperation = 'lighter';
      g.globalAlpha = dark ? 0.35 : 0.55;
      const hl = g.createRadialGradient(
        r0 - brainSize * 0.12, r0 - brainSize * 0.18, 0,
        r0, r0, brainSize * 0.42
      );
      hl.addColorStop(0, P.brainHl);
      hl.addColorStop(1, 'rgba(255,255,255,0)');
      g.fillStyle = hl;
      g.beginPath(); g.arc(r0, r0, brainSize * 0.55, 0, Math.PI * 2); g.fill();
      g.globalAlpha = 1;
      g.globalCompositeOperation = 'source-over';
      return;
    }

    // -------- Procedural fallback (image not loaded) --------
    g.translate(r0, r0);
    const brainR = 70 * scale;
    g.scale(brainR, brainR);

    const outline = new Path2D();
    const N = 64;
    const pts = [];
    for (let i = 0; i < N; i++) {
      const a = (i / N) * Math.PI * 2;
      let r = 1
        + 0.04 * Math.sin(a * 2)
        + 0.05 * Math.sin(a * 5 + 1.3)
        + 0.03 * Math.cos(a * 3 + 0.7);
      r -= 0.13 * Math.exp(-Math.pow((a + Math.PI/2), 2) / 0.08);
      pts.push([Math.cos(a) * r * 1.15, Math.sin(a) * r * 0.9]);
    }
    outline.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i <= N; i++) outline.lineTo(pts[i % N][0], pts[i % N][1]);
    outline.closePath();

    const body = g.createRadialGradient(0, 0, 0.05, 0, 0, 1.3);
    body.addColorStop(0, P.brainBody[0]);
    body.addColorStop(0.55, P.brainBody[1]);
    body.addColorStop(1, P.brainBody[2]);
    g.fillStyle = body;
    g.fill(outline);

    g.strokeStyle = P.brainGyri;
    g.lineWidth = 0.025; g.lineJoin = 'round'; g.lineCap = 'round';
    for (let gy = 0; gy < 9; gy++) {
      const yBase = (gy - 4) * 0.18;
      const amp = 0.07 + (gy % 3) * 0.02;
      const freq = 4 + (gy % 4);
      const xStart = -1.05 + (gy % 2) * 0.05;
      const xEnd   =  1.05 - (gy % 2) * 0.05;
      const steps = 50;
      g.beginPath();
      for (let i = 0; i <= steps; i++) {
        const u = i / steps;
        const x = xStart + (xEnd - xStart) * u;
        const y = yBase + Math.sin(u * Math.PI * freq + gy) * amp * (1 - Math.pow(2*u-1, 2));
        if (i === 0) g.moveTo(x, y); else g.lineTo(x, y);
      }
      g.stroke();
    }

    g.strokeStyle = P.brainEdge;
    g.lineWidth = 0.018;
    g.stroke(outline);

    g.scale(1 / brainR, 1 / brainR);
    const hl = g.createRadialGradient(-brainR * 0.15, -brainR * 0.2, 0, 0, 0, brainR * 0.6);
    hl.addColorStop(0, P.brainHl);
    hl.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = hl;
    g.beginPath(); g.arc(0, 0, brainR * 0.85, 0, Math.PI * 2); g.fill();
  }

  function rebuildLayers() {
    if (W <= 0 || H <= 0) return;
    invalidateCss();
    buildBackground();
    buildBrain();
  }

  function resize() {
    DPR = clampDpr(S.dpr);
    const r = canvas.getBoundingClientRect();
    W = Math.max(1, r.width); H = Math.max(1, r.height);
    canvas.width  = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    cx = W / 2; cy = H / 2;
    scale = Math.min(W, H) / 720;
    rebuildLayers();
  }
  window.addEventListener('resize', resize);

  // ---------- Tentacle update ----------
  // Maximum radius from (cx,cy) along angle `a` before hitting the viewport.
  function maxRadiusForAngle(a, margin) {
    const c = Math.cos(a), s = Math.sin(a);
    let rx = Infinity, ry = Infinity;
    if (Math.abs(c) > 1e-6) rx = c > 0 ? (W - margin - cx) / c : (margin - cx) / c;
    if (Math.abs(s) > 1e-6) ry = s > 0 ? (H - margin - cy) / s : (margin - cy) / s;
    return Math.max(0, Math.min(rx, ry));
  }
  // Per-tentacle base radius: starts inside the brain silhouette so every
  // tentacle visually attaches to the brain, regardless of angle.
  function tentacleBaseR(t) {
    // brain on canvas: drawn centred at (cx, cy), rendered size = brainSize
    const brainSize = (300 * scale) * 0.78;
    const half = brainSize / 2;
    const norm = (t.brainEdgeNorm != null) ? t.brainEdgeNorm : 0.5;
    // 0.92 = inset slightly past the silhouette edge so the tentacle root
    // sinks into the brain body (no visible gap).
    return Math.max(20 * scale, half * norm * 0.92);
  }
  function updateTentacle(t, time, out) {
    const minDim = Math.min(W, H);
    const baseR  = tentacleBaseR(t);
    const wMul   = S.wobble;
    const margin = 28 * scale;

    const angSwing = (t.wobbleBase * wMul) * 0.5;
    const safeR = Math.min(
      maxRadiusForAngle(t.baseAngle, margin),
      maxRadiusForAngle(t.baseAngle + angSwing, margin),
      maxRadiusForAngle(t.baseAngle - angSwing, margin)
    );
    const desired = t.length * minDim;
    const len = Math.min(desired, Math.max(0, safeR - baseR));

    for (let i = 0; i <= TENT_SEGS; i++) {
      const u = i / TENT_SEGS;
      const r = baseR + u * len;
      const wob = Math.sin(u * 6 + time * t.speed + t.phase) * (t.wobbleBase * wMul) * (0.15 + u * 0.85);
      const a = t.baseAngle + wob * 0.5;
      out[i * 2]     = cx + Math.cos(a) * r;
      out[i * 2 + 1] = cy + Math.sin(a) * r;
    }
  }
  function pointAt(buf, u) {
    const max = TENT_SEGS;
    const idx = u * max;
    const i = Math.min(max - 1, Math.floor(idx));
    const f = idx - i;
    const ax = buf[i * 2],     ay = buf[i * 2 + 1];
    const bx = buf[(i + 1) * 2], by = buf[(i + 1) * 2 + 1];
    return [ax + (bx - ax) * f, ay + (by - ay) * f];
  }

  // ---------- Frame loop ----------
  let last = performance.now();
  let t0 = last;
  let timeAcc = 0;
  let fpsLast = last, fpsFrames = 0;
  const fpsEl = document.getElementById('fps');

  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    timeAcc += dt * S.speed;
    const time = timeAcc;

    // FPS readout (sampled)
    fpsFrames++;
    if (now - fpsLast > 500) {
      const fps = (fpsFrames * 1000 / (now - fpsLast)) | 0;
      fpsEl.textContent = `${fps} fps`;
      fpsLast = now; fpsFrames = 0;
    }

    const P = palette();

    // BG
    ctx.globalCompositeOperation = 'source-over';
    ctx.drawImage(bgLayer, 0, 0, W, H);

    // Ripple rings
    ctx.globalCompositeOperation = P.ringBlend;
    const ringMaxR = Math.min(W, H) * 0.42;
    ctx.lineWidth = 1.6 * scale;
    const RC = Math.max(0, S.rings | 0);
    for (let k = 0; k < RC; k++) {
      const phase = ((time * 0.30) + k / Math.max(1, RC)) % 1;
      const r = phase * ringMaxR + 60 * scale;
      const alpha = (1 - phase) * 0.50;
      ctx.strokeStyle = (k % 2 === 0) ? P.rippleCyan(alpha) : P.rippleGold(alpha);
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    }

    // Tentacles
    ctx.lineCap = 'round';
    const hueShift = S.hue;
    const aStops = P.tentaclePassAlpha;
    const lStops = P.tentacleHueLightness;
    const sat = P.tentacleSaturation;
    const [hMin, hMax] = P.tentacleHueRange;
    const widths = [14 * scale, 5 * scale, 1.4 * scale];
    for (let i = 0; i < tentacles.length; i++) {
      const t = tentacles[i];
      const buf = tentBuf[i];
      updateTentacle(t, time, buf);

      // Map per-tentacle hueBase (185…265) into the theme's narrowed hue range.
      const u = Math.max(0, Math.min(1, (t.hueBase - 185) / 80));
      const hue = ((hMin + u * (hMax - hMin) + hueShift) % 360 + 360) % 360;

      ctx.beginPath();
      ctx.moveTo(buf[0], buf[1]);
      for (let j = 1; j <= TENT_SEGS; j++) ctx.lineTo(buf[j * 2], buf[j * 2 + 1]);

      for (let pass = 0; pass < 3; pass++) {
        ctx.strokeStyle = `hsla(${hue}, ${sat}%, ${lStops[pass]}%, ${aStops[pass]})`;
        ctx.lineWidth = widths[pass];
        ctx.stroke();
      }
    }

    // Binary streams
    if (streams.length) {
      ctx.font = `bold ${(11 * scale).toFixed(1)}px ui-monospace, SFMono-Regular, Menlo, monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      for (const s of streams) {
        s.u += s.sp * dt * S.speed;
        if (s.u > 1) { s.u = 0; s.char = Math.random() < 0.5 ? '0' : '1'; }
        const idx = tentacles.indexOf(s.t);
        if (idx < 0) continue;
        const p = pointAt(tentBuf[idx], s.u);
        const a = s.alpha * (0.35 + s.u * 0.65);
        ctx.fillStyle = P.streamFill(a);
        ctx.fillText(s.char, p[0], p[1]);
      }
    }

    // Brain — subtle pulse: 0.78 → 0.92, ~1.2s period, doesn't overwhelm.
    const pulse = 0.5 + 0.5 * Math.sin(time * 1.2);
    const bw = brainLayer.width / DPR;
    const bh = brainLayer.height / DPR;
    ctx.globalAlpha = 0.78 + 0.14 * pulse;
    ctx.drawImage(brainLayer, cx - bw / 2, cy - bh / 2, bw, bh);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';

    if (!reduceMotion) requestAnimationFrame(frame);
  }

  // ---------- UI wiring ----------
  const $ = (id) => document.getElementById(id);
  const panel = $('panel');
  $('panelHeader').addEventListener('click', () => panel.classList.toggle('collapsed'));

  function bindRange(id, key, fmt, onChange) {
    const el = $(id);
    const out = $('v' + id[0].toUpperCase() + id.slice(1));
    el.value = String(S[key]);
    out.textContent = fmt(S[key]);
    el.addEventListener('input', () => {
      S[key] = Number(el.value);
      out.textContent = fmt(S[key]);
      onChange?.();
      saveSettings();
    });
  }
  bindRange('tentacles', 'tentacles', v => String(v|0), () => rebuildTentacles());
  bindRange('streams',   'streams',   v => String(v|0), () => rebuildStreams());
  bindRange('rings',     'rings',     v => String(v|0));
  bindRange('speed',     'speed',     v => `${(+v).toFixed(2)}×`);
  bindRange('wobble',    'wobble',    v => `${(+v).toFixed(2)}×`);
  bindRange('hue',       'hue',       v => `${v|0}°`);
  bindRange('dpr',       'dpr',       v => `${(+v).toFixed(2)}`, () => resize());

  for (const id of ['themeLight','themeDark','themeAuto']) {
    $(id).addEventListener('click', (e) => {
      S.theme = e.currentTarget.dataset.theme;
      saveSettings();
      applyTheme();
    });
  }
  $('reset').addEventListener('click', () => {
    S = { ...DEFAULTS };
    saveSettings();
    // Push values back into UI
    for (const k of Object.keys(DEFAULTS)) {
      const el = $(k);
      if (el && el.tagName === 'INPUT') {
        el.value = String(S[k]);
        el.dispatchEvent(new Event('input'));
      }
    }
    applyTheme();
    rebuildTentacles();
    resize();
  });

  // ---------- Boot ----------
  applyTheme();
  resize();
  rebuildTentacles();
  if (reduceMotion) frame(performance.now());
  else requestAnimationFrame(frame);

  // Async load brain image and rebuild brain layer when ready.
  loadBrainImage().then((keyed) => {
    if (!keyed) return; // fallback: procedural brain stays
    brainImgKeyed = keyed;
    brainImgKeyedReady = true;
    captureBrainAlpha(keyed);
    refreshBrainEdgesForTentacles();
    buildBrain();
  });
})();
</script>
</body>
</html>
