<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PI Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 2rem;
    }
    .welcome { max-width: 480px; width: 100%; }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; color: #f8fafc; }
    p.lead { color: #94a3b8; font-size: 1rem; margin-bottom: 1.75rem; line-height: 1.5; }
    .btn {
      padding: 0.75rem 1.5rem; border: none; border-radius: 0.5rem;
      font-size: 1rem; cursor: pointer; font-weight: 500;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #1e3a8a; cursor: wait; opacity: 0.7; }
    .btn-link {
      background: transparent; color: #94a3b8; padding: 0.5rem 0;
      text-decoration: underline; font-size: 0.875rem;
    }
    .btn-link:hover { color: #e2e8f0; }
    details { margin-top: 1.5rem; border-top: 1px solid #1e293b; padding-top: 1rem; }
    summary { cursor: pointer; color: #94a3b8; font-size: 0.875rem; user-select: none; }
    summary:hover { color: #e2e8f0; }
    .advanced { margin-top: 1rem; }
    .form-row { display: flex; gap: 0.5rem; align-items: stretch; }
    .form-row input {
      flex: 1; padding: 0.625rem 0.75rem;
      border: 1px solid #334155; border-radius: 0.5rem;
      background: #1e293b; color: #e2e8f0; font-size: 0.95rem;
    }
    .form-row input:focus { outline: none; border-color: #3b82f6; }
    .btn-secondary {
      background: #334155; color: #e2e8f0;
      padding: 0.625rem 1rem; font-size: 0.95rem;
    }
    .btn-secondary:hover { background: #475569; }
    .status { margin-top: 0.5rem; font-size: 0.825rem; min-height: 1.2em; }
    .status.ok { color: #22c55e; }
    .status.err { color: #ef4444; }
    .status.busy { color: #f59e0b; }
  </style>
</head>
<body>
  <div class="welcome">
    <h1>Welcome to PI Dashboard</h1>
    <p class="lead">
      Everything you need ships inside this app. Click <b>Launch dashboard</b> to start
      the local server and open the dashboard.
    </p>

    <button id="launch" class="btn btn-primary">Launch dashboard</button>

    <details>
      <summary>Advanced: connect to an existing server</summary>
      <div class="advanced">
        <p style="color:#64748b;font-size:0.85rem;margin-bottom:0.75rem;">
          Already have a dashboard running on another machine? Connect to it instead of
          starting a local server.
        </p>
        <div class="form-row">
          <input id="remote-url" type="text" placeholder="http://hostname:8000" />
          <button id="test-remote" class="btn btn-secondary">Test</button>
        </div>
        <div id="remote-status" class="status"></div>
        <button id="connect-remote" class="btn btn-link" style="display:none;">Use this server</button>
      </div>
    </details>
  </div>

  <script>
    // Renderer talks to main via window.wizardApi (exposed by preload.ts).
    // The preload bridge exposes only `completeWizard` + `openDoctor` today;
    // remote-mode wiring is local to this renderer (a simple fetch).

    const launchBtn = document.getElementById("launch");
    const remoteUrl = document.getElementById("remote-url");
    const testBtn = document.getElementById("test-remote");
    const connectBtn = document.getElementById("connect-remote");
    const status = document.getElementById("remote-status");

    let lastVerifiedUrl = null;

    launchBtn.addEventListener("click", async () => {
      launchBtn.disabled = true;
      launchBtn.textContent = "Starting…";
      try {
        if (window.wizardApi && typeof window.wizardApi.completeWizard === "function") {
          await window.wizardApi.completeWizard();
        }
        // Closing the window resolves the openWizardWindow() promise in main.ts,
        // which then proceeds to launch-server → health-wait → done.
        window.close();
      } catch (err) {
        launchBtn.disabled = false;
        launchBtn.textContent = "Launch dashboard";
        status.className = "status err";
        status.textContent = String((err && err.message) || err);
      }
    });

    function normalize(input) {
      const v = (input || "").trim();
      if (!v) return null;
      if (/^https?:\/\//i.test(v)) return v.replace(/\/$/, "");
      // Allow bare host:port input
      return `http://${v.replace(/\/$/, "")}`;
    }

    async function probe(url) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 4000);
      try {
        const r = await fetch(`${url}/api/health`, { signal: ctrl.signal });
        if (!r.ok) return { ok: false, reason: `HTTP ${r.status}` };
        const body = await r.json().catch(() => null);
        if (!body) return { ok: false, reason: "No JSON body" };
        return { ok: true, version: body.version || "?" };
      } catch (err) {
        return { ok: false, reason: (err && err.message) || String(err) };
      } finally {
        clearTimeout(timer);
      }
    }

    testBtn.addEventListener("click", async () => {
      const url = normalize(remoteUrl.value);
      lastVerifiedUrl = null;
      connectBtn.style.display = "none";
      if (!url) {
        status.className = "status err";
        status.textContent = "Enter a URL (e.g. http://hostname:8000)";
        return;
      }
      status.className = "status busy";
      status.textContent = `Testing ${url}…`;
      const res = await probe(url);
      if (res.ok) {
        status.className = "status ok";
        status.textContent = `Reachable (server version ${res.version}).`;
        lastVerifiedUrl = url;
        connectBtn.style.display = "inline-block";
      } else {
        status.className = "status err";
        status.textContent = `Not reachable: ${res.reason}`;
      }
    });

    connectBtn.addEventListener("click", async () => {
      if (!lastVerifiedUrl) return;
      // "Use this server" persists remote mode + the verified URL to
      // mode.json. main.ts reads it on next launch and attaches directly,
      // skipping local server discovery/spawn. See change: docker-packaging.
      try {
        if (window.wizardApi && typeof window.wizardApi.persistMode === "function") {
          await window.wizardApi.persistMode("remote", lastVerifiedUrl);
        }
        if (window.wizardApi && typeof window.wizardApi.completeWizard === "function") {
          await window.wizardApi.completeWizard();
        }
      } catch { /* non-fatal */ }
      window.close();
    });

    remoteUrl.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") testBtn.click();
    });
  </script>
</body>
</html>
